<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submitted Recruitment Requests - NGU Portal</title>
    <style>
        :root {
            /* Shared NGU Dark Theme */
            --body-bg: #141d26;
            --container-bg: #1c2938;
            --input-bg: #2d3d50;
            --panel-border: #38444d;
            --primary-text: #e1e8ed;
            --secondary-text: #8899a6;
            --accent-color: #00d4ff; /* NGU Cyan */
            --success-color: #2ecc71;
            --danger-color: #ef4444;
            --pending-color: #f1c40f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--body-bg);
            color: var(--primary-text);
            line-height: 1.6;
            padding: 20px;
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Header Styling */
        .page-header {
            background-color: var(--container-bg);
            padding: 20px 30px;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo { height: 40px; width: auto; }

        .page-header h1 {
            font-size: 1.4em;
            color: var(--primary-text);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Loading/Error States */
        #status-message {
            text-align: center;
            padding: 40px;
            color: var(--secondary-text);
            background-color: var(--container-bg);
            border-radius: 8px;
            border: 1px solid var(--panel-border);
        }

        /* Accordion List Styling */
        .request-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .request-item {
            background-color: var(--container-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* Accordion Summary Header (The non-expanded view) */
        .request-summary {
            padding: 15px 20px;
            cursor: pointer;
            display: grid;
            /* Grid layout: Job Title | Dept | Location | Date | Arrow */
            grid-template-columns: 2fr 1.5fr 1fr 1.2fr 40px;
            align-items: center;
            gap: 10px;
            transition: background-color 0.2s;
        }

        .request-summary:hover {
            background-color: rgba(255,255,255,0.03);
        }

        .summary-cell {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.95em;
        }

        .cell-label {
            display: none; /* Hide labels in desktop view */
            color: var(--secondary-text);
            font-size: 0.8em;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .summary-job-title {
            color: var(--accent-color);
            font-weight: 600;
        }

        .summary-date {
            color: var(--secondary-text);
            font-family: monospace;
        }

        .expand-icon {
            text-align: center;
            color: var(--secondary-text);
            transition: transform 0.3s ease;
        }

        /* Accordion Content (The expanded detailed view) */
        .request-details {
            max-height: 0; /* Hidden by default */
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            border-top: 0 solid var(--panel-border);
            background-color: rgba(0,0,0,0.15);
        }

        /* Active State for Accordion */
        .request-item.active {
            border-color: var(--accent-color);
            box-shadow: 0 4px 15px rgba(0,212,255,0.1);
        }

        .request-item.active .request-details {
            max-height: 3000px; /* Arbitrary large height for expansion transition */
            border-top-width: 1px;
            padding: 30px;
        }

        .request-item.active .expand-icon {
            transform: rotate(180deg);
            color: var(--accent-color);
        }

        /* Detailed View Inner Styling (Replicating form layout) */
        .detail-section {
            margin-bottom: 30px;
        }

        .detail-section-title {
            font-size: 0.9em;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--panel-border);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .full-width { grid-column: 1 / -1; }

        .detail-block label {
            display: block;
            color: var(--secondary-text);
            font-size: 0.8em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        /* Styling for read-only values */
        .detail-value {
            color: var(--primary-text);
            font-size: 1em;
            background-color: rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 4px;
            min-height: 38px;
        }

        .detail-value.empty { color: #555; font-style: italic; }

        textarea.detail-value {
            width: 100%;
            height: auto;
            resize: none;
            font-family: inherit;
            border: none;
        }

        /* Signature style */
        .signature-value {
            font-style: italic;
            font-family: 'Georgia', serif;
            color: var(--accent-color);
            font-size: 1.1em;
        }

        /* 
           --- Styling for EDITABLE fields in expanded view ---
           Adapted from submission form CSS
        */
        .edit-input, .edit-select {
            width: 100%;
            padding: 8px 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            font-family: inherit;
            color: var(--primary-text);
            font-size: 1em;
            transition: all 0.2s ease;
        }

        .edit-input:focus, .edit-select:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #314358;
        }

        /* Date picker icon in dark mode */
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .edit-radio-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .edit-radio-group label {
            text-transform: none; font-weight: normal; color: var(--primary-text);
            display: flex; align-items: center; gap: 5px; font-size: 0.95em;
            cursor: pointer;
        }

        .edit-radio-group input { accent-color: var(--accent-color); cursor: pointer; }

        /* Approval Table (editable) */
        .approval-table {
            width: 100%; border-collapse: collapse; margin-top: 10px;
            background-color: rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden;
        }
        .approval-table th, .approval-table td { border: 1px solid var(--panel-border); padding: 10px; text-align: left; }
        .approval-table th { background-color: rgba(0,0,0,0.2); color: var(--secondary-text); font-size: 0.8em; text-transform: uppercase; }
        strong.approver-label { color: var(--primary-text); font-weight: 600; font-size: 0.95em;}

        /* Action Buttons */
        .admin-actions {
            display: flex; justify-content: flex-end; gap: 15px;
            margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--panel-border);
        }

        button.btn-save {
            padding: 10px 20px; border: none; border-radius: 4px;
            font-size: 0.9em; font-weight: 700; cursor: pointer;
            transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 0.05em;
            background-color: var(--success-color); color: #000;
        }

        button.btn-save:hover { filter: brightness(1.1); }
        button.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Mobile Responsive adjustments */
        @media (max-width: 768px) {
            .page-header { flex-direction: column; text-align: center; gap: 10px; }
            
            .request-summary {
                grid-template-columns: 1fr 40px;
                gap: 5px;
                padding: 15px;
            }

            .summary-cell {
                grid-column: 1 / 2;
                white-space: normal;
                display: flex;
                flex-direction: column;
                margin-bottom: 8px;
            }

            .cell-label { display: block; }
            
            .request-summary .expand-icon {
                grid-column: 2 / 3;
                grid-row: 1 / 5;
            }

            .request-item.active .request-details { padding: 20px; }
            .detail-grid { grid-template-columns: 1fr; }

            /* Mobile table layout */
            .approval-table, .approval-table thead, .approval-table tbody, .approval-table th, .approval-table td, .approval-table tr { display: block; }
            .approval-table th { display: none; }
            .approval-table td { position: relative; padding-left: 40%; border-bottom: none; min-height: 45px;}
            .approval-table td::before {
                content: attr(data-label); position: absolute; left: 10px;
                color: var(--secondary-text); font-weight: 600; font-size: 0.8em; text-transform: uppercase;
            }
            .approval-table tr { border-bottom: 1px solid var(--panel-border); margin-bottom: 5px; background-color: rgba(0,0,0,0.1); }
        }
    </style>
</head>
<body>

<div class="main-container">
    <header class="page-header">
        <div class="header-brand">
            <img src="https://www.dropbox.com/scl/fi/kkujm1u6y7vvnp7luq8d7/ngu-main-white.png?rlkey=kgq2uh48qh4xssh4vlbz868lr&st=6cy1lbvp&dl=1" alt="NGU Logo" class="logo">
            <h1>Workflow Manager</h1>
        </div>
        <div style="font-size: 0.9em; color: var(--secondary-text);">Admin Access</div>
    </header>

    <div id="status-message">⏳ Loading submitted requests...</div>
    
    <div id="request-list-container" class="request-list" style="display: none;">
        <!-- Dynamically populated via JS -->
    </div>
</div>

<!-- Firebase SDK (Compat) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // --- Firebase Configuration ---
    const firebaseConfig = {
        apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
        authDomain: "oesperformance-a54c0.firebaseapp.com",
        projectId: "oesperformance-a54c0",
        storageBucket: "oesperformance-a54c0.firebasestorage.app",
        messagingSenderId: "484894102454",
        appId: "1:484894102454:web:17535ee497eac2d90d6717",
        measurementId: "G-R56BGZYV8N"
    };

    // --- Initialize Firebase ---
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const collectionName = "NGU Recuitment Approval Form";

    const container = document.getElementById('request-list-container');
    const statusMsg = document.getElementById('status-message');

    // Helper: format Firestore timestamp to readable date/time
    const formatTimestamp = (timestamp) => {
        if (!timestamp) return "N/A";
        const date = timestamp.toDate();
        return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) + 
               ', ' + date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    };

    // Helper: Safely get read-only value or return placeholder
    const getReadOnlyValue = (val) => {
        if (val === null || val === undefined || val === "") return '<span class="empty">Not provided</span>';
        if (Array.isArray(val)) return val.length > 0 ? val.join(', ') : '<span class="empty">None</span>';
        return val;
    };

    // Fetch data from Firestore
    async function fetchRequests() {
        try {
            // Listen for real-time updates so we don't need to refresh after saving
            db.collection(collectionName)
              .orderBy('submittedAt', 'desc')
              .onSnapshot((snapshot) => {
                if (snapshot.empty) {
                    statusMsg.textContent = "No recruitment requests found.";
                    statusMsg.style.display = 'block';
                    container.style.display = 'none';
                    return;
                }

                statusMsg.style.display = 'none';
                container.style.display = 'flex';
                
                // Store IDs of items currently expanded to re-expand them after render
                const expandedIds = Array.from(document.querySelectorAll('.request-item.active')).map(el => el.id.replace('item-',''));

                container.innerHTML = ''; // Clear container

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const reqId = doc.id;
                    
                    const jobTitle = data.requestInformation?.jobTitle || 'Unknown Title';
                    const dept = data.requestInformation?.department || 'Unknown Dept';
                    const location = data.requestInformation?.location || 'Unknown';
                    const submitDate = formatTimestamp(data.submittedAt);

                    // Create Item HTML
                    const itemHtml = `
                        <div class="request-item ${expandedIds.includes(reqId) ? 'active' : ''}" id="item-${reqId}">
                            <div class="request-summary" onclick="toggleAccordion('${reqId}')">
                                <div class="summary-cell summary-job-title">
                                    <div class="cell-label">Job Title</div>
                                    ${jobTitle}
                                </div>
                                <div class="summary-cell">
                                    <div class="cell-label">Department</div>
                                    ${dept}
                                </div>
                                <div class="summary-cell">
                                    <div class="cell-label">Location</div>
                                    ${location}
                                </div>
                                <div class="summary-cell summary-date">
                                    <div class="cell-label">Submitted</div>
                                    ${submitDate}
                                </div>
                                <div class="expand-icon">▼</div>
                            </div>
                            
                            <div class="request-details" id="details-${reqId}">
                                ${generateDetailedView(reqId, data, submitDate)}
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', itemHtml);
                });
            });

        } catch (error) {
            console.error("Error fetching documents: ", error);
            statusMsg.textContent = "Error loading requests. Please check console.";
            statusMsg.style.color = 'var(--danger-color)';
        }
    }

    // Function to generate HTML. 
    // Request data is read-only. Approval/Outcome sections are editable forms.
    function generateDetailedView(reqId, data, formattedSubmitDate) {
        // Helper to generate select HTML with selected option
        const getSelectHtml = (name, currentVal, options) => {
            let html = `<select class="edit-select" name="${name}" data-req-id="${reqId}">`;
            options.forEach(opt => {
                const selected = opt === currentVal ? 'selected' : '';
                html += `<option value="${opt}" ${selected}>${opt}</option>`;
            });
            html += `</select>`;
            return html;
        };

        const decisionOptions = ['Pending', 'Approve', 'Reject', 'More Info Needed'];

        return `
            <!-- 1. Read-Only Request Info (Submitted by user) -->
            <div class="detail-section">
                <div class="detail-section-title">Request Information (Read-Only)</div>
                <div class="detail-grid">
                    <div class="detail-block"><label>Date Requested</label><div class="detail-value">${getReadOnlyValue(data.requestInformation?.dateOfRequest)}</div></div>
                    <div class="detail-block"><label>Requested By</label><div class="detail-value">${getReadOnlyValue(data.requestInformation?.requestedBy)}</div></div>
                    <div class="detail-block"><label>Hiring Manager</label><div class="detail-value">${getReadOnlyValue(data.requestInformation?.hiringManager)}</div></div>
                    <div class="detail-block"><label>System Submit Date</label><div class="detail-value">${formattedSubmitDate}</div></div>
                    <div class="detail-block full-width"><label>Vacancy Type(s)</label><div class="detail-value">${getReadOnlyValue(data.vacancyType)}</div></div>
                    <div class="detail-block full-width">
                        <label>Why is this role required?</label>
                        <textarea class="detail-value" rows="3" readonly>${data.businessCase?.whyRoleRequired || 'N/A'}</textarea>
                    </div>
                    <div class="detail-block">
                        <label>Proposed Salary</label>
                        <div class="detail-value">${getReadOnlyValue(data.budgetSalary?.proposedSalary)}</div>
                    </div>
                    <div class="detail-block">
                        <label>Declaration Name</label>
                        <div class="detail-value">${getReadOnlyValue(data.declaration?.name)}</div>
                    </div>
                    <div class="detail-block full-width">
                        <label>Requestor Signature</label>
                        <div class="detail-value signature-value">${getReadOnlyValue(data.declaration?.signature)}</div>
                    </div>
                </div>
            </div>

            <!-- 2. EDITABLE Approval Sign Off Section -->
            <div class="detail-section" id="approval-form-${reqId}">
                <div class="detail-section-title">Approval Sign Off (Action Required)</div>
                <table class="approval-table">
                    <thead>
                        <tr><th>Approver</th><th>Decision</th><th>Comments</th><th>Date</th></tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td data-label="Approver"><strong class="approver-label">Dept Head</strong></td>
                            <td data-label="Decision">${getSelectHtml('dept-head-decision', data.approvalSignOff?.departmentHead?.decision, decisionOptions)}</td>
                            <td data-label="Comments"><input type="text" class="edit-input" name="dept-head-comments" value="${data.approvalSignOff?.departmentHead?.comments || ''}" data-req-id="${reqId}"></td>
                            <td data-label="Date"><input type="date" class="edit-input" name="dept-head-date" value="${data.approvalSignOff?.departmentHead?.date || ''}" data-req-id="${reqId}"></td>
                        </tr>
                        <tr>
                            <td data-label="Approver"><strong class="approver-label">Finance</strong></td>
                            <td data-label="Decision">${getSelectHtml('finance-decision', data.approvalSignOff?.finance?.decision, decisionOptions)}</td>
                            <td data-label="Comments"><input type="text" class="edit-input" name="finance-comments" value="${data.approvalSignOff?.finance?.comments || ''}" data-req-id="${reqId}"></td>
                            <td data-label="Date"><input type="date" class="edit-input" name="finance-date" value="${data.approvalSignOff?.finance?.date || ''}" data-req-id="${reqId}"></td>
                        </tr>
                        <tr>
                            <td data-label="Approver"><strong class="approver-label">Final</strong></td>
                            <td data-label="Decision">${getSelectHtml('final-decision', data.approvalSignOff?.finalApprover?.decision, decisionOptions)}</td>
                            <td data-label="Comments"><input type="text" class="edit-input" name="final-comments" value="${data.approvalSignOff?.finalApprover?.comments || ''}" data-req-id="${reqId}"></td>
                            <td data-label="Date"><input type="date" class="edit-input" name="final-date" value="${data.approvalSignOff?.finalApprover?.date || ''}" data-req-id="${reqId}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 3. EDITABLE Final Outcome Section -->
            <div class="detail-section" id="outcome-form-${reqId}">
                <div class="detail-section-title">Final Outcome (Admin Use)</div>
                <div class="detail-grid">
                    <div class="detail-block">
                        <label>Approved to Recruit?</label>
                        <div class="edit-radio-group">
                            <label><input type="radio" name="approved-${reqId}" value="Yes" ${data.finalOutcome?.approvedToRecruit === 'Yes' ? 'checked' : ''}> Yes</label>
                            <label><input type="radio" name="approved-${reqId}" value="No" ${data.finalOutcome?.approvedToRecruit === 'No' ? 'checked' : ''}> No</label>
                        </div>
                    </div>
                    <div class="detail-block">
                        <label>Date Actioned</label>
                        <input type="date" class="edit-input" name="date-approved-${reqId}" value="${data.finalOutcome?.dateApproved || ''}">
                    </div>
                    <div class="detail-block">
                        <label>Recruitment Ref #</label>
                        <input type="text" class="edit-input" name="recruitment-ref-${reqId}" value="${data.finalOutcome?.recruitmentReference || ''}" placeholder="e.g. NGU001">
                    </div>
                    <div class="detail-block">
                        <label>Team Notified?</label>
                        <div class="edit-radio-group">
                            <label><input type="radio" name="team-notified-${reqId}" value="Yes" ${data.finalOutcome?.recruitmentTeamNotified === 'Yes' ? 'checked' : ''}> Yes</label>
                            <label><input type="radio" name="team-notified-${reqId}" value="No" ${data.finalOutcome?.recruitmentTeamNotified === 'No' ? 'checked' : ''}> No</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons for this specific request -->
            <div class="admin-actions">
                <button type="button" class="btn-save" id="save-btn-${reqId}" onclick="saveApprovals('${reqId}')">Save Changes / Update Status</button>
            </div>
        `;
    }

    // Toggle Accordion function
    function toggleAccordion(reqId) {
        const item = document.getElementById(`item-${reqId}`);
        // Optional: Close other open items
        /*
        document.querySelectorAll('.request-item').forEach(el => {
            if (el.id !== `item-${reqId}`) el.classList.remove('active');
        });
        */
        item.classList.toggle('active');
    }

    // --- SAVE LOGIC ---
    // Collects data from editable fields in expanded view and updates Firestore
    async function saveApprovals(reqId) {
        const saveBtn = document.getElementById(`save-btn-${reqId}`);
        const detailsPanel = document.getElementById(`details-${reqId}`);
        
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';

        // Helper to get input value within this specific accordion panel
        const getElVal = (name) => detailsPanel.querySelector(`[name="${name}"]`)?.value || '';
        
        // Helper for radio buttons within this specific panel
        const getRadioVal = (name) => detailsPanel.querySelector(`input[name="${name}"]:checked`)?.value || null;

        // Construct update object echoing the submission structure
        const updatedData = {
            approvalSignOff: { 
                departmentHead: {
                    decision: getElVal('dept-head-decision'),
                    comments: getElVal('dept-head-comments'),
                    date: getElVal('dept-head-date')
                },
                finance: {
                    decision: getElVal('finance-decision'),
                    comments: getElVal('finance-comments'),
                    date: getElVal('finance-date')
                },
                finalApprover: {
                    decision: getElVal('final-decision'),
                    comments: getElVal('final-comments'),
                    date: getElVal('final-date')
                }
            },
            finalOutcome: {
                approvedToRecruit: getRadioVal(`approved-${reqId}`),
                dateApproved: getElVal(`date-approved-${reqId}`),
                recruitmentReference: getElVal(`recruitment-ref-${reqId}`),
                recruitmentTeamNotified: getRadioVal(`team-notified-${reqId}`)
            },
            lastUpdatedByAdmin: firebase.firestore.FieldValue.serverTimestamp() // Good practice audit trail
        };

        try {
            // Update specific document in Firestore
            await db.collection(collectionName).doc(reqId).update(updatedData);
            console.log("Document updated: ", reqId);
            alert('Approvals and status updated successfully.');
            // No reload needed due to onSnapshot listener, inputs will stay as set
        } catch (error) {
            console.error("Error updating document: ", error);
            alert('Error saving changes. Verify permissions and try again.');
        } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save Changes / Update Status';
        }
    }

    // Start on load
    window.onload = fetchRequests;
</script>

</body>
</html>
