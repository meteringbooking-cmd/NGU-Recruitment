<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NGU Portal</title>
    <style>
        :root {
            /* Shared NGU Dark Theme */
            --body-bg: #141d26;
            --container-bg: #1c2938;
            --input-bg: #2d3d50;
            --panel-border: #38444d;
            --primary-text: #e1e8ed;
            --secondary-text: #8899a6;
            --accent-color: #00d4ff; 
            --danger-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--body-bg);
            color: var(--primary-text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 400px;
            background-color: var(--container-bg);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo { height: 60px; width: auto; margin-bottom: 20px; }

        h1 {
            font-size: 1.4em;
            color: var(--primary-text);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 30px;
        }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; color: var(--secondary-text); font-size: 0.85em; text-transform: uppercase; margin-bottom: 8px; }
        
        .login-input {
            width: 100%; padding: 12px 15px;
            background-color: var(--input-bg); border: 1px solid var(--panel-border);
            border-radius: 6px; color: var(--primary-text); font-family: inherit; font-size: 1em;
        }
        .login-input:focus { outline: none; border-color: var(--accent-color); }

        button.btn-login {
            width: 100%; padding: 14px; border: none; border-radius: 6px;
            font-size: 1em; font-weight: 700; cursor: pointer;
            transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.05em;
            background-color: var(--accent-color); color: #000;
            margin-top: 10px;
        }
        button.btn-login:hover { filter: brightness(1.1); }
        button.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        #error-message {
            color: var(--danger-color);
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger-color);
            padding: 10px; border-radius: 6px;
            font-size: 0.9em; margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <img src="https://www.dropbox.com/scl/fi/kkujm1u6y7vvnp7luq8d7/ngu-main-white.png?rlkey=kgq2uh48qh4xssh4vlbz868lr&st=6cy1lbvp&dl=1" alt="NGU Logo" class="logo">
    <h1>Portal Login</h1>

    <div id="error-message">⚠️ Invalid username or password.</div>

    <form id="login-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" class="login-input" required placeholder="Full Name">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="login-input" required>
        </div>
        <button type="submit" class="btn-login" id="submit-btn">Sign In</button>
    </form>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // --- Firebase Configuration ---
    const firebaseConfig = {
        apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
        authDomain: "oesperformance-a54c0.firebaseapp.com",
        projectId: "oesperformance-a54c0",
        storageBucket: "oesperformance-a54c0.firebasestorage.app",
        messagingSenderId: "484894102454",
        appId: "1:484894102454:web:17535ee497eac2d90d6717",
        measurementId: "G-R56BGZYV8N"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const usersCollection = "NGU User Database"; 

    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-message');
    const submitBtn = document.getElementById('submit-btn');

    window.onload = () => {
        if(localStorage.getItem('ngu_portal_username')){
            window.location.href = 'homepage.html';
        }
    };

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        errorMsg.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = "Verifying...";

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        // --- HARDCODED EMERGENCY FAILSAFE ---
        if (username === 'Admin' && password === 'Pingu2020!&') {
            console.log("Emergency Failsafe Login Successful.");
            
            localStorage.setItem('ngu_portal_username', 'Hardcoded Emergency Admin');
            localStorage.setItem('ngu_portal_access_submission', 'true');
            localStorage.setItem('ngu_portal_access_management', 'true');
            localStorage.setItem('ngu_portal_access_live_vacancies', 'true');
            localStorage.setItem('ngu_portal_access_applications', 'true');
            localStorage.setItem('ngu_portal_access_ftl', 'true');
            localStorage.setItem('ngu_portal_access_contracts', 'true');
            localStorage.setItem('ngu_portal_access_admin_review', 'true');
            localStorage.setItem('ngu_portal_access_referrals', 'true');
            localStorage.setItem('ngu_portal_access_archives', 'true');
            localStorage.setItem('ngu_portal_access_userdb', 'true'); 

            window.location.href = 'homepage.html';
            return; 
        }

        // --- NORMAL DB LOGIN ---
        db.collection(usersCollection).where("username", "==", username).get()
          .then((snapshot) => {
              if (snapshot.empty) throw new Error("Auth failed");

              const userDoc = snapshot.docs[0];
              const userData = userDoc.data();

              if (userData.password !== password) throw new Error("Auth failed");

              // Save highly granular permissions to localStorage
              localStorage.setItem('ngu_portal_username', username);
              localStorage.setItem('ngu_portal_access_submission', String(userData.accessSubmission || false));
              localStorage.setItem('ngu_portal_access_management', String(userData.accessManager || false));
              localStorage.setItem('ngu_portal_access_live_vacancies', String(userData.accessLiveVacancies || false));
              localStorage.setItem('ngu_portal_access_applications', String(userData.accessApplications || false));
              localStorage.setItem('ngu_portal_access_ftl', String(userData.accessFtl || false));
              localStorage.setItem('ngu_portal_access_contracts', String(userData.accessContracts || false));
              localStorage.setItem('ngu_portal_access_admin_review', String(userData.accessAdminReview || false));
              localStorage.setItem('ngu_portal_access_referrals', String(userData.accessReferrals || false));
              localStorage.setItem('ngu_portal_access_archives', String(userData.accessArchives || false));
              localStorage.setItem('ngu_portal_access_userdb', String(userData.accessUserDb || false));

              window.location.href = 'homepage.html';
          })
          .catch((error) => {
              console.error("Login Error: ", error);
              errorMsg.style.display = 'block';
              submitBtn.disabled = false;
              submitBtn.textContent = "Sign In";
              localStorage.clear();
          });
    });
</script>

</body>
</html>
