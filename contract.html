<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NGU — Contracts & Policies Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        // Prototype Security Script
        (function() {
            const username = localStorage.getItem('ngu_portal_username');
            if (!username) {
                window.location.href = 'login.html';
                return;
            }
        })();
    </script>

    <style>
        :root {
            --primary: #005EB8; --accent: #00A3E0;
            --bg-dark: #0A1628; --bg-card: #1a2942; --bg-input: #0d1f3a;
            --text-light: #E8EDF2; --text-muted: #8B9AAE; --border: #2a3f5f;
            --success: #10B981; --error: #EF4444; --warning: #F59E0B;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Work Sans', sans-serif; 
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0d1f3a 100%); 
            color: var(--text-light); 
            min-height: 100vh; 
            padding: 2rem; 
        }
        
        .main-container { max-width: 1200px; margin: 0 auto; }

        .page-header {
            background-color: var(--bg-card); padding: 20px 30px; border-radius: 12px;
            border: 1px solid var(--border); margin-bottom: 30px; display: flex;
            justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            flex-wrap: wrap; gap: 15px;
        }

        .header-brand { display: flex; align-items: center; gap: 15px; }
        .logo { height: 40px; width: auto; }
        .page-header h1 { font-size: 1.4em; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.1em; margin: 0; }

        .btn-link {
            border-radius: 8px; cursor: pointer; font-size: 0.85em; transition: all 0.2s;
            text-decoration: none; display: inline-flex; align-items: center; font-weight: 600;
            border: 1px solid var(--border); background-color: var(--bg-input); color: var(--text-light); padding: 10px 20px;
        }
        .btn-link:hover { background-color: #38444d; border-color: #4f5b66; }

        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 2rem; }

        .card { 
            background: var(--bg-card); border: 1px solid var(--border); 
            border-radius: 12px; padding: 2rem; box-shadow: 0 8px 25px rgba(0,0,0,0.2); 
            display: flex; flex-direction: column; gap: 1.5rem;
        }
        .card h2 { color: var(--accent); font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }

        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 600; }
        .form-control { 
            width: 100%; padding: 1rem; border-radius: 8px; border: 1px solid var(--border); 
            background: var(--bg-input); color: white; font-family: inherit; font-size: 0.95rem; outline: none; transition: all 0.2s;
        }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,163,224,0.15); }
        textarea.form-control { resize: vertical; min-height: 250px; }
        input[type="file"] { padding: 0.8rem; cursor: pointer; }
        input[type="file"]::file-selector-button { background: var(--accent); border: none; padding: 0.5rem 1rem; border-radius: 4px; color: white; font-weight: 600; cursor: pointer; margin-right: 1rem; transition: background 0.2s; }
        input[type="file"]::file-selector-button:hover { background: var(--primary); }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); 
            color: white; padding: 1rem; border: none; border-radius: 8px; font-weight: 700; 
            font-size: 1rem; cursor: pointer; transition: all 0.2s; font-family: inherit; 
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,163,224,0.3); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .list-container { margin-top: 1rem; display: flex; flex-direction: column; gap: 10px; }
        .list-item { 
            background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; 
            padding: 1rem; display: flex; justify-content: space-between; align-items: center; gap: 15px;
        }
        .list-item-info { display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .list-item-title { font-weight: 700; font-size: 1.05rem; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-item-meta { font-size: 0.8rem; color: var(--text-muted); font-family: 'DM Mono', monospace; }
        
        .btn-danger { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.4); color: #fca5a5; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 0.85rem;}
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }
        .btn-view { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.4); color: #6ee7b7; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 0.85rem; text-decoration: none;}
        .btn-view:hover { background: rgba(16, 185, 129, 0.2); }
        
        .empty-state { text-align: center; color: var(--text-muted); font-style: italic; font-size: 0.9rem; padding: 1rem; }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <header class="page-header">
        <a href="homepage.html" class="btn-link">← Hub</a>
        <div class="header-brand">
            <img src="https://www.dropbox.com/scl/fi/kkujm1u6y7vvnp7luq8d7/ngu-main-white.png?rlkey=kgq2uh48qh4xssh4vlbz868lr&raw=1" alt="NGU Logo" class="logo">
            <h1>Contracts & Policies Manager</h1>
        </div>
        <div style="font-size: 0.9rem; color: var(--text-muted);">
            Logged in: <strong id="displayName" style="color: white;"></strong>
        </div>
    </header>

    <div class="grid-2">
        <!-- CONTRACTS MANAGER -->
        <div class="card">
            <h2>Employment Contracts</h2>
            
            <div class="form-group">
                <label>Job Title (Target Role)</label>
                <input type="text" id="contractJobTitle" class="form-control" placeholder="e.g. Smart Meter Engineer">
            </div>
            
            <div class="form-group">
                <label>Contract Template Text</label>
                <textarea id="contractBody" class="form-control" placeholder="Paste the standard contract text here..."></textarea>
            </div>
            
            <button class="btn-primary" id="btnSaveContract" onclick="saveContract()">Save Contract Template</button>

            <h3 style="color:var(--text-muted); font-size:1rem; margin-top:1.5rem; border-bottom:1px solid var(--border); padding-bottom:0.5rem;">Active Contracts in System</h3>
            <div class="list-container" id="contractsList">
                <div class="empty-state">Loading...</div>
            </div>
        </div>

        <!-- BONUS POLICIES MANAGER -->
        <div class="card">
            <h2>Bonus Policies</h2>
            
            <div class="form-group">
                <label>Campaign Name</label>
                <input type="text" id="policyCampaign" class="form-control" placeholder="e.g. Scottish Power">
            </div>
            
            <div class="form-group">
                <label>Upload Policy Document (PDF/Doc)</label>
                <input type="file" id="policyFile" class="form-control" accept=".pdf,.doc,.docx">
            </div>
            
            <button class="btn-primary" id="btnUploadPolicy" onclick="uploadPolicy()">Upload Bonus Policy</button>

            <h3 style="color:var(--text-muted); font-size:1rem; margin-top:1.5rem; border-bottom:1px solid var(--border); padding-bottom:0.5rem;">Active Policies in System</h3>
            <div class="list-container" id="policiesList">
                <div class="empty-state">Loading...</div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, query, where, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
        authDomain: "oesperformance-a54c0.firebaseapp.com",
        projectId: "oesperformance-a54c0",
        storageBucket: "oesperformance-a54c0.firebasestorage.app",
        messagingSenderId: "484894102454",
        appId: "1:484894102454:web:17535ee497eac2d90d6717"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    
    // Set Display Name
    const currentUser = localStorage.getItem('ngu_portal_username') || 'Unknown User';
    document.getElementById('displayName').textContent = currentUser;

    const COLLECTION_NAME = "NGU Contacts & Policies";

    // --- REAL-TIME LISTENERS ---
    
    // Listen for Contracts
    const qContracts = query(collection(db, COLLECTION_NAME), where("type", "==", "contract"));
    onSnapshot(qContracts, (snapshot) => {
        const listEl = document.getElementById('contractsList');
        listEl.innerHTML = '';
        if (snapshot.empty) {
            listEl.innerHTML = '<div class="empty-state">No contracts currently saved.</div>';
            return;
        }
        snapshot.forEach(docSnap => {
            const data = docSnap.data();
            const dateStr = data.updatedAt?.toDate ? data.updatedAt.toDate().toLocaleDateString('en-GB') : 'Unknown Date';
            
            listEl.innerHTML += `
                <div class="list-item">
                    <div class="list-item-info">
                        <div class="list-item-title">${data.jobTitle}</div>
                        <div class="list-item-meta">Updated: ${dateStr}</div>
                    </div>
                    <button class="btn-danger" onclick="deleteItem('${docSnap.id}')">Delete</button>
                </div>
            `;
        });
    });

    // Listen for Policies
    const qPolicies = query(collection(db, COLLECTION_NAME), where("type", "==", "policy"));
    onSnapshot(qPolicies, (snapshot) => {
        const listEl = document.getElementById('policiesList');
        listEl.innerHTML = '';
        if (snapshot.empty) {
            listEl.innerHTML = '<div class="empty-state">No policies currently saved.</div>';
            return;
        }
        snapshot.forEach(docSnap => {
            const data = docSnap.data();
            const dateStr = data.updatedAt?.toDate ? data.updatedAt.toDate().toLocaleDateString('en-GB') : 'Unknown Date';
            
            listEl.innerHTML += `
                <div class="list-item">
                    <div class="list-item-info">
                        <div class="list-item-title">${data.campaignName}</div>
                        <div class="list-item-meta">Updated: ${dateStr}</div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <a href="${data.fileUrl}" target="_blank" class="btn-view">View</a>
                        <button class="btn-danger" onclick="deleteItem('${docSnap.id}')">Delete</button>
                    </div>
                </div>
            `;
        });
    });

    // --- SAVE CONTRACT LOGIC ---
    window.saveContract = async function() {
        const jobTitle = document.getElementById('contractJobTitle').value.trim();
        const content = document.getElementById('contractBody').value.trim();
        const btn = document.getElementById('btnSaveContract');

        if (!jobTitle || !content) return alert("Please provide both a Job Title and the Contract text.");

        btn.disabled = true;
        btn.textContent = 'Saving...';

        try {
            // Use safe ID formatting
            const docId = `contract_${jobTitle.toLowerCase().replace(/[^a-z0-9]/g, '_')}`;
            
            await setDoc(doc(db, COLLECTION_NAME, docId), {
                type: "contract",
                jobTitle: jobTitle,
                content: content,
                updatedAt: serverTimestamp(),
                updatedBy: currentUser
            });

            document.getElementById('contractJobTitle').value = '';
            document.getElementById('contractBody').value = '';
            alert("Contract successfully saved.");
        } catch (error) {
            console.error("Error saving contract:", error);
            alert("Failed to save contract. Please check connection.");
        } finally {
            btn.disabled = false;
            btn.textContent = 'Save Contract Template';
        }
    };

    // --- UPLOAD POLICY LOGIC ---
    window.uploadPolicy = async function() {
        const campaignName = document.getElementById('policyCampaign').value.trim();
        const fileInput = document.getElementById('policyFile');
        const btn = document.getElementById('btnUploadPolicy');

        if (!campaignName) return alert("Please provide a Campaign Name.");
        if (fileInput.files.length === 0) return alert("Please select a file to upload.");

        const file = fileInput.files[0];
        btn.disabled = true;
        btn.textContent = 'Uploading...';

        try {
            // 1. Upload to Firebase Storage
            const storagePath = `bonus_policies/${Date.now()}_${file.name}`;
            const fileRef = ref(storage, storagePath);
            await uploadBytes(fileRef, file);
            const downloadUrl = await getDownloadURL(fileRef);

            // 2. Save metadata to Firestore
            const docId = `policy_${campaignName.toLowerCase().replace(/[^a-z0-9]/g, '_')}`;
            
            await setDoc(doc(db, COLLECTION_NAME, docId), {
                type: "policy",
                campaignName: campaignName,
                fileName: file.name,
                fileUrl: downloadUrl,
                storagePath: storagePath,
                updatedAt: serverTimestamp(),
                updatedBy: currentUser
            });

            document.getElementById('policyCampaign').value = '';
            fileInput.value = '';
            alert("Bonus Policy successfully uploaded.");
        } catch (error) {
            console.error("Error uploading policy:", error);
            alert("Failed to upload policy. Please check connection.");
        } finally {
            btn.disabled = false;
            btn.textContent = 'Upload Bonus Policy';
        }
    };

    // --- DELETE LOGIC ---
    window.deleteItem = async function(docId) {
        if (!confirm("Are you sure you want to delete this item? This action cannot be undone.")) return;
        
        try {
            await deleteDoc(doc(db, COLLECTION_NAME, docId));
        } catch (error) {
            console.error("Error deleting document:", error);
            alert("Failed to delete. Please try again.");
        }
    };
</script>
</body>
</html>
