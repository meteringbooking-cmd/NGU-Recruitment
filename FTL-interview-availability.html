<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NGU — Interview Schedule (FTL)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script>
        (function() {
            const username = localStorage.getItem('ngu_portal_username');
            if (!username) {
                window.location.href = 'login.html';
                return;
            }
        })();
    </script>

    <style>
        :root {
            --primary: #005EB8; --accent: #00A3E0;
            --bg-dark: #0A1628; --bg-card: #1a2942; --bg-input: #0d1f3a;
            --text-light: #E8EDF2; --text-muted: #8B9AAE; --border: #2a3f5f;
            --success: #10B981; --error: #EF4444; --warning: #F59E0B;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Work Sans', sans-serif;
            background: var(--bg-dark); color: var(--text-light);
            min-height: 100vh; padding: 20px;
        }
        
        .main-container { max-width: 1000px; margin: 0 auto; }

        .page-header {
            background-color: var(--bg-card); padding: 20px 30px; border-radius: 12px;
            border: 1px solid var(--border); margin-bottom: 30px; display: flex;
            justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            flex-wrap: wrap; gap: 15px;
        }

        .header-brand { display: flex; align-items: center; gap: 15px; }
        .logo { height: 40px; width: auto; }
        .page-header h1 { font-size: 1.4em; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.1em; margin: 0; }

        .btn-link {
            border-radius: 4px; cursor: pointer; font-size: 0.85em; transition: all 0.2s;
            text-decoration: none; display: inline-flex; align-items: center; font-weight: 600;
            border: 1px solid var(--border); background-color: var(--bg-input); color: var(--text-light); padding: 8px 15px;
        }
        .btn-link:hover { background-color: #38444d; border-color: #4f5b66; }

        .schedule-grid { display: flex; flex-direction: column; gap: 15px; }

        .interview-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-left: 5px solid var(--warning); border-radius: 10px;
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: all 0.2s;
            flex-wrap: wrap; gap: 15px;
        }
        .interview-card:hover { border-color: var(--accent); transform: translateX(5px); }
        .interview-card.claimed { border-left-color: var(--success); }

        .card-info { display: flex; flex-direction: column; gap: 5px; }
        .card-date { font-family: 'DM Mono', monospace; font-size: 1.1rem; color: #6ee7b7; font-weight: 600; }
        .card-name { font-size: 1.3rem; font-weight: 700; color: var(--text-light); }
        .card-booked-at { font-size: 0.8rem; color: var(--text-muted); font-style: italic; }

        .card-action { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
        
        .btn-claim {
            background: rgba(0,163,224,0.1); border: 1px solid rgba(0,163,224,0.4);
            color: var(--accent); padding: 0.7rem 1.5rem; border-radius: 8px;
            font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
        }
        .btn-claim:hover { background: rgba(0,163,224,0.2); }
        
        .claimed-badge {
            background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.4);
            color: #6ee7b7; padding: 0.5rem 1rem; border-radius: 8px;
            font-size: 0.9rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px;
        }
        
        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); font-size: 1.1rem; }

        @media (max-width: 600px) {
            .interview-card { flex-direction: column; align-items: flex-start; }
            .card-action { align-items: flex-start; width: 100%; }
            .btn-claim { width: 100%; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <header class="page-header">
        <a href="homepage.html" class="btn-link">← Hub</a>
        <div class="header-brand">
            <img src="https://www.dropbox.com/scl/fi/kkujm1u6y7vvnp7luq8d7/ngu-main-white.png?rlkey=kgq2uh48qh4xssh4vlbz868lr&raw=1" alt="NGU Logo" class="logo">
            <h1>Interview Schedule</h1>
        </div>
        <div style="font-size: 0.9rem; color: var(--text-muted);">
            Logged in: <strong id="displayName" style="color: white;"></strong>
        </div>
    </header>

    <div id="scheduleGrid" class="schedule-grid">
        <div class="empty-state">⏳ Loading schedule...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, where } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    // --- EMAILJS CONFIG ---
    const EMAILJS_PUBLIC_KEY = 'ziLnha91scpGjFABh';
    const EMAILJS_SERVICE_ID = 'service_b3nh4bo'; 
    const EMAILJS_FTL_REMINDER = 'template_v410t15';
    const EMAILJS_APP_REMINDER = 'template_n1r23pg';
    emailjs.init(EMAILJS_PUBLIC_KEY);

    const firebaseConfig = {
        apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
        authDomain: "oesperformance-a54c0.firebaseapp.com",
        projectId: "oesperformance-a54c0",
        storageBucket: "oesperformance-a54c0.firebasestorage.app",
        messagingSenderId: "484894102454",
        appId: "1:484894102454:web:17535ee497eac2d90d6717"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const currentUser = localStorage.getItem('ngu_portal_username') || 'Unknown User';
    
    document.getElementById('displayName').textContent = currentUser;
    const scheduleGrid = document.getElementById('scheduleGrid');

    // Load active interviews
    const today = new Date().toISOString().split('T')[0];
    const q = query(collection(db, "NGU Interview Times"), where("date", ">=", today));

    onSnapshot(q, (snapshot) => {
        scheduleGrid.innerHTML = '';
        
        const bookings = [];
        snapshot.forEach(doc => {
            bookings.push({ id: doc.id, ...doc.data() });
        });

        // Background script to process email reminders silently
        processAutomatedReminders(bookings);

        bookings.sort((a, b) => {
            if (a.date === b.date) return a.time.localeCompare(b.time);
            return a.date.localeCompare(b.date);
        });

        if (bookings.length === 0) {
            scheduleGrid.innerHTML = '<div class="empty-state">There are currently no upcoming interviews booked.</div>';
            return;
        }

        bookings.forEach(booking => {
            const displayDate = new Date(booking.date).toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' });
            const bookedDateStr = booking.bookedAt?.toDate ? booking.bookedAt.toDate().toLocaleString('en-GB') : 'Unknown';

            let actionHtml = '';
            let cardClass = 'interview-card';

            if (booking.interviewer) {
                cardClass += ' claimed';
                actionHtml = `
                    <div class="claimed-badge">
                        <span>👤 Claimed by ${booking.interviewer}</span>
                    </div>
                `;
            } else {
                actionHtml = `
                    <button class="btn-claim" onclick="claimInterview('${booking.id}')">Assign to Me</button>
                `;
            }

            const card = document.createElement('div');
            card.className = cardClass;
            card.innerHTML = `
                <div class="card-info">
                    <div class="card-date">🗓 ${displayDate} @ ${booking.time}</div>
                    <div class="card-name">${booking.applicantName} - <span style="font-size:0.9rem; font-weight:normal;">${booking.position || 'Applicant'}</span></div>
                    <div class="card-booked-at">System Booked: ${bookedDateStr}</div>
                </div>
                <div class="card-action">
                    ${actionHtml}
                </div>
            `;
            scheduleGrid.appendChild(card);
        });
    }, (error) => {
        console.error("Error loading schedule:", error);
    });

    // --- BACKGROUND AUTOMATION SCRIPT ---
    async function processAutomatedReminders(bookings) {
        const now = new Date();

        for (const b of bookings) {
            const docRef = doc(db, "NGU Interview Times", b.id);
            const updates = {};
            let emailSent = false;

            // 1. FTL UNCLAIMED REMINDER LOGIC (24, 48, 72 hours)
            if (!b.interviewer && b.bookedAt) {
                const bookedTime = b.bookedAt.toDate ? b.bookedAt.toDate() : new Date(b.bookedAt);
                const hoursWaiting = (now - bookedTime) / (1000 * 60 * 60);
                const level = b.unclaimedReminderLevel || 0;

                if (hoursWaiting >= 72 && level < 3) {
                    updates.unclaimedReminderLevel = 3;
                    emailSent = true;
                } else if (hoursWaiting >= 48 && level < 2) {
                    updates.unclaimedReminderLevel = 2;
                    emailSent = true;
                } else if (hoursWaiting >= 24 && level < 1) {
                    updates.unclaimedReminderLevel = 1;
                    emailSent = true;
                }

                if (emailSent) {
                    const displayDate = new Date(b.date).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_FTL_REMINDER, {
                        applicant_name: b.applicantName,
                        hours_waiting: Math.floor(hoursWaiting),
                        interview_date: displayDate,
                        interview_time: b.time,
                        portal_link: window.location.href
                    });
                }
            }

            // 2. APPLICANT 24HR REMINDER LOGIC
            if (b.applicantEmail && !b.applicantReminderSent) {
                // Construct Date Object for Interview Time
                const interviewDateTime = new Date(`${b.date}T${b.time}`);
                const hoursUntilInterview = (interviewDateTime - now) / (1000 * 60 * 60);

                // If interview is strictly between 0 and 24 hours away
                if (hoursUntilInterview > 0 && hoursUntilInterview <= 24) {
                    updates.applicantReminderSent = true;

                    const displayDate = new Date(b.date).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                    const firstName = b.applicantName ? b.applicantName.split(' ')[0] : 'Applicant';

                    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_APP_REMINDER, {
                        to_email: b.applicantEmail,
                        first_name: firstName,
                        job_title: b.position || 'the role',
                        interview_date: displayDate,
                        interview_time: b.time,
                        interviewer_name: b.interviewer || 'a member of our team',
                        location_method: 'Microsoft Teams',
                        contact_email: 'recruitment@next-gen.uk'
                    });
                }
            }

            // Sync flags to Database if any emails fired
            if (Object.keys(updates).length > 0) {
                await updateDoc(docRef, updates);
            }
        }
    }

    window.claimInterview = async function(docId) {
        if (!confirm("Are you sure you want to assign yourself as the interviewer for this timeslot?")) return;
        try {
            await updateDoc(doc(db, "NGU Interview Times", docId), { interviewer: currentUser });
        } catch (error) {
            console.error("Error claiming interview:", error);
            alert("Error assigning interview. Please try again.");
        }
    };
</script>
</body>
</html>
