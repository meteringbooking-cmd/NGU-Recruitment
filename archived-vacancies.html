<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archived Vacancies - NGU Portal</title>
    
    <!-- 
      --- PROTOTYPE SECURITY SCRIPT ---
    -->
    <script>
        (function() {
            const username = localStorage.getItem('ngu_portal_username');
            const hasAccess = localStorage.getItem('ngu_portal_access_management'); 

            if (!username) {
                window.location.href = 'login.html';
                return;
            }
            if (hasAccess !== 'true') {
                alert("Access Denied: You do not have permission to view the Archives.");
                window.location.href = 'homepage.html';
                return;
            }
        })();
    </script>
    
    <style>
        :root {
            /* Shared NGU Dark Theme */
            --body-bg: #141d26;
            --container-bg: #1c2938;
            --input-bg: #2d3d50;
            --panel-border: #38444d;
            --primary-text: #e1e8ed;
            --secondary-text: #8899a6;
            --accent-color: #00d4ff; 
            --danger-color: #ef4444;
            --archive-color: #64748b; /* Neutral grey for archived items */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--body-bg);
            color: var(--primary-text);
            line-height: 1.6;
            padding: 20px;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header Styling */
        .page-header {
            background-color: var(--container-bg);
            padding: 20px 30px;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-brand-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo { height: 40px; width: auto; }

        .page-header h1 {
            font-size: 1.4em;
            color: var(--archive-color);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0;
        }

        .btn-link {
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            font-weight: 600;
            border: 1px solid var(--panel-border);
            background-color: var(--input-bg);
            color: var(--primary-text);
            padding: 8px 15px;
        }
        .btn-link:hover {
            background-color: #38444d;
            border-color: #4f5b66;
        }

        #status-message {
            text-align: center;
            padding: 40px;
            color: var(--secondary-text);
            background-color: var(--container-bg);
            border-radius: 8px;
            border: 1px solid var(--panel-border);
            max-width: 800px; margin: 0 auto;
        }

        /* Vacancy Grid */
        .vacancy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        /* Vacancy Card (Archived Style) */
        .vacancy-card {
            background-color: var(--container-bg);
            border: 1px solid var(--panel-border);
            border-top: 4px solid var(--archive-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            opacity: 0.85; /* Slightly faded to indicate it's inactive */
        }

        .card-header {
            padding: 20px;
            border-bottom: 1px solid var(--panel-border);
            background-color: rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 1.2em;
            color: var(--primary-text);
            font-weight: 700;
            margin-bottom: 5px;
            text-decoration: line-through; /* Visual cue that it is closed */
            text-decoration-color: rgba(255,255,255,0.3);
        }

        .card-dept {
            font-size: 0.9em;
            color: var(--secondary-text);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .info-block label {
            display: block;
            color: var(--secondary-text);
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 3px;
        }

        .info-block .value {
            color: var(--primary-text);
            font-size: 0.95em;
            font-weight: 500;
        }

        .full-width { grid-column: 1 / -1; }

        /* Advert Action Section */
        .card-footer {
            padding: 20px;
            border-top: 1px solid var(--panel-border);
            background-color: rgba(255,255,255,0.02);
            display: flex;
            flex-direction: column;
        }

        .footer-title {
            font-size: 0.85em;
            color: var(--primary-text);
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .advert-toggles {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(0,0,0,0.15);
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid var(--panel-border);
        }

        .toggle-row label {
            font-size: 0.9em;
            color: var(--secondary-text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Archive Metadata Block */
        .archive-meta {
            margin-top: 10px;
            padding-top: 15px;
            border-top: 1px dashed var(--panel-border);
            font-size: 0.8em;
            color: var(--secondary-text);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .archive-meta strong {
            color: var(--archive-color);
        }

        @media (max-width: 768px) {
            .page-header { flex-direction: column; text-align: center; justify-content: center;}
            .header-brand-container { flex-direction: column; }
            .vacancy-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <header class="page-header">
        <div class="header-brand-container">
            <a href="workflow-manager.html" class="btn-link">← Workflow Manager</a>
            <a href="live-vacancies.html" class="btn-link">← Live Vacancies</a>
            <div class="header-brand">
                <img src="https://www.dropbox.com/scl/fi/kkujm1u6y7vvnp7luq8d7/ngu-main-white.png?rlkey=kgq2uh48qh4xssh4vlbz868lr&st=6cy1lbvp&dl=1" alt="NGU Logo" class="logo">
                <h1>Archived Vacancies</h1>
            </div>
        </div>
    </header>

    <div id="status-message">⏳ Loading archives...</div>
    
    <div id="vacancy-grid" class="vacancy-grid" style="display: none;">
        <!-- Populated via JS -->
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
        authDomain: "oesperformance-a54c0.firebaseapp.com",
        projectId: "oesperformance-a54c0",
        storageBucket: "oesperformance-a54c0.firebasestorage.app",
        messagingSenderId: "484894102454",
        appId: "1:484894102454:web:17535ee497eac2d90d6717",
        measurementId: "G-R56BGZYV8N"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const collectionName = "NGU Recuitment Approval Form";

    const gridContainer = document.getElementById('vacancy-grid');
    const statusMsg = document.getElementById('status-message');

    const safeStr = (val) => val || 'Not specified';

    const formatDate = (dateString) => {
        if (!dateString) return 'Not specified';
        const d = new Date(dateString);
        if (isNaN(d.getTime())) return dateString; 
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    };

    // Note: Querying where workflowClosed == true
    db.collection(collectionName)
      .where('workflowClosed', '==', true)
      .onSnapshot((snapshot) => {
          
          gridContainer.innerHTML = '';
          let archiveCount = 0;

          snapshot.forEach(doc => {
              archiveCount++;
              renderArchivedCard(doc.id, doc.data());
          });

          if (archiveCount === 0) {
              statusMsg.textContent = "No archived vacancies found.";
              statusMsg.style.display = 'block';
              gridContainer.style.display = 'none';
          } else {
              statusMsg.style.display = 'none';
              gridContainer.style.display = 'grid';
          }
      }, (error) => {
          console.error("Error fetching archives: ", error);
          statusMsg.innerHTML = `<span style="color:var(--danger-color)">Error loading data. Check console.</span>`;
      });

    function renderArchivedCard(reqId, data) {
        const jobTitle = safeStr(data.requestInformation?.jobTitle);
        const dept = safeStr(data.requestInformation?.department);
        const location = safeStr(data.requestInformation?.location);
        
        const dateApproved = data.finalOutcome?.dateApproved || data.approvalSignOff?.finalApprover?.date;
        const desiredStart = data.recruitmentRequirements?.desiredStartDate;

        // Archive metadata (set by the close function in live-vacancies.html)
        const closedAt = data.vacancyClosedAt || 'Unknown Date';
        const closedBy = data.vacancyClosedBy || 'System/Unknown';

        const externalReq = data.recruitmentRequirements?.externalAdvertRequired === 'Yes';
        const internalReq = data.recruitmentRequirements?.internalAdvertRequired === 'Yes';

        const advertStatus = data.advertStatus || {};
        const isLinkedinLive = advertStatus.linkedinLive || false;
        const isIndeedLive = advertStatus.indeedLive || false;
        const isInternalEmailSent = advertStatus.internalEmailSent || false;

        let advertHtml = '';
        
        // Render checkboxes as disabled (read-only)
        if (externalReq) {
            advertHtml += `
                <div class="toggle-row">
                    <label>
                        <input type="checkbox" disabled ${isLinkedinLive ? 'checked' : ''}> 
                        LinkedIn Advert Was Live
                    </label>
                </div>
                <div class="toggle-row">
                    <label>
                        <input type="checkbox" disabled ${isIndeedLive ? 'checked' : ''}> 
                        Indeed Advert Was Live
                    </label>
                </div>
            `;
        }

        if (internalReq) {
            advertHtml += `
                <div class="toggle-row">
                    <label>
                        <input type="checkbox" disabled ${isInternalEmailSent ? 'checked' : ''}> 
                        Internal Email Was Distributed
                    </label>
                </div>
            `;
        }

        if (!externalReq && !internalReq) {
            advertHtml = `<div style="color: var(--secondary-text); font-size: 0.9em; font-style: italic;">No advertising was requested.</div>`;
        }

        const cardHtml = `
            <div class="vacancy-card">
                <div class="card-header">
                    <div class="card-title">${jobTitle}</div>
                    <div class="card-dept">${dept}</div>
                </div>
                
                <div class="card-body">
                    <div class="info-block full-width">
                        <label>Location</label>
                        <div class="value">${location}</div>
                    </div>
                    <div class="info-block">
                        <label>Date Approved</label>
                        <div class="value">${formatDate(dateApproved).split(',')[0]}</div>
                    </div>
                    <div class="info-block">
                        <label>Target Start Date</label>
                        <div class="value">${formatDate(desiredStart).split(',')[0]}</div>
                    </div>
                </div>

                <div class="card-footer">
                    <div class="footer-title">Final Advert Status</div>
                    <div class="advert-toggles">
                        ${advertHtml}
                    </div>
                    <div class="archive-meta">
                        <div><strong>Archived On:</strong> ${formatDate(closedAt)}</div>
                        <div><strong>Archived By:</strong> ${closedBy}</div>
                    </div>
                </div>
            </div>
        `;

        gridContainer.insertAdjacentHTML('beforeend', cardHtml);
    }
</script>

</body>
</html>
