<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NGU — Book Your Interview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        :root {
            --primary: #005EB8; --accent: #00A3E0;
            --bg-dark: #0A1628; --bg-card: #1a2942; --bg-input: #0d1f3a;
            --text-light: #E8EDF2; --text-muted: #8B9AAE; --border: #2a3f5f;
            --success: #10B981; --error: #EF4444; --warning: #F59E0B;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0d1f3a 100%);
            color: var(--text-light); min-height: 100vh; padding: 2rem 1.5rem;
            display: flex; flex-direction: column; align-items: center;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 15% 20%, rgba(0,163,224,0.08) 0%, transparent 55%),
                        radial-gradient(circle at 85% 75%, rgba(0,94,184,0.07) 0%, transparent 55%);
            pointer-events: none; z-index: -1;
        }
        
        .container { width: 100%; max-width: 600px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 8px 25px rgba(0,0,0,0.3); margin-top: 2rem; }
        .logo { max-height: 60px; display: block; margin: 0 auto 1.5rem; }
        .page-header { text-align: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
        .page-header h1 { font-size: 1.8rem; font-weight: 800; color: var(--accent); margin-bottom: 0.5rem; }
        .page-header p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; font-size: 0.9rem; color: var(--text-light); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        
        input[type="date"], input[type="text"], input[type="email"] {
            width: 100%; padding: 0.9rem 1rem; background: var(--bg-input);
            border: 2px solid var(--border); border-radius: 10px; color: var(--text-light);
            font-size: 1rem; font-family: inherit; transition: all 0.2s; outline: none;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,163,224,0.15); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); cursor: pointer; }

        .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 1rem; }
        
        .slot-btn {
            background: var(--bg-input); border: 2px solid var(--border);
            color: var(--text-light); padding: 0.8rem; border-radius: 8px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
            font-family: 'DM Mono', monospace;
        }
        .slot-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: rgba(0,163,224,0.1); }
        .slot-btn:disabled { background: rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.05); color: var(--text-muted); cursor: not-allowed; text-decoration: line-through; }
        
        .status-msg { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-top: 1rem; font-style: italic; }

        /* Modal Styles */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;}
        .modal-overlay.active { display: flex; animation: fadeIn 0.2s ease;}
        .modal-content { background: var(--bg-card); width: 100%; max-width: 400px; border-radius: 16px; border: 1px solid var(--border); padding: 2.5rem; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; }
        .modal-title { font-size: 1.4rem; color: var(--accent); font-weight: 700; margin-bottom: 0.5rem; }
        .modal-subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
        
        .btn { padding: 0.85rem 1.5rem; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; width: 100%; margin-top: 1rem; }
        .btn-primary { background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); color: white; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,163,224,0.35); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--text-light); margin-top: 0.5rem; }
        .btn-cancel:hover { background: rgba(255,255,255,0.05); }

        #successScreen { display: none; text-align: center; padding: 3rem 1rem; }
        .success-icon { font-size: 4rem; margin-bottom: 1rem; }
        
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    </style>
</head>
<body>

    <img src="https://www.dropbox.com/scl/fi/kkujm1u6y7vvnp7luq8d7/ngu-main-white.png?rlkey=kgq2uh48qh4xssh4vlbz868lr&raw=1" alt="NGU Logo" class="logo">
    
    <div class="container" id="bookingContainer">
        <div class="page-header">
            <h1>Interview Booking</h1>
            <p>Select an available date and time below to schedule your interview with Next Generation Utilities.</p>
        </div>

        <div class="form-group">
            <label>1. Select a Date</label>
            <input type="date" id="datePicker">
        </div>

        <div class="form-group" id="slotsWrapper" style="display: none;">
            <label>2. Select a Time Slot</label>
            <div class="slots-grid" id="slotsGrid"></div>
            <div id="loadingStatus" class="status-msg"></div>
        </div>
    </div>

    <div class="container" id="successScreen">
        <div class="success-icon">✅</div>
        <h1 style="color:var(--success); margin-bottom:1rem;">Booking Confirmed!</h1>
        <p style="color:var(--text-muted); font-size:1.05rem; line-height:1.6;" id="successMsg"></p>
    </div>

    <!-- BOOKING CONFIRMATION MODAL -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal-content">
            <div class="modal-title">Confirm Booking</div>
            <div class="modal-subtitle" id="modalTimeDisplay"></div>
            
            <input type="hidden" id="selectedDate">
            <input type="hidden" id="selectedTime">

            <div style="text-align: left; margin-bottom: 1rem;">
                <label>Your Full Name <span style="color:var(--accent);">*</span></label>
                <input type="text" id="applicantName" placeholder="e.g. Jane Doe">
            </div>
            
            <div style="text-align: left; margin-bottom: 1rem;">
                <label>Email Address <span style="color:var(--accent);">*</span></label>
                <input type="email" id="applicantEmail" placeholder="To receive your confirmation">
            </div>
            
            <div style="text-align: left; margin-bottom: 1.5rem;">
                <label>Position Applied For <span style="color:var(--accent);">*</span></label>
                <input type="text" id="applicantPosition" placeholder="e.g. Smart Meter Engineer">
            </div>

            <button class="btn btn-primary" id="confirmBtn" onclick="submitBooking()">Confirm Interview</button>
            <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore, collection, query, where, getDocs, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    // --- EMAILJS CONFIG ---
    const EMAILJS_PUBLIC_KEY = 'ziLnha91scpGjFABh';
    const EMAILJS_SERVICE_ID = 'service_b3nh4bo'; 
    const EMAILJS_FTL_TEMPLATE = 'template_5cpb2mc';
    const EMAILJS_APPLICANT_CONFIRM = 'template_xf6p7vc'; // New template
    emailjs.init(EMAILJS_PUBLIC_KEY);

    const firebaseConfig = {
        apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
        authDomain: "oesperformance-a54c0.firebaseapp.com",
        projectId: "oesperformance-a54c0",
        storageBucket: "oesperformance-a54c0.firebasestorage.app",
        messagingSenderId: "484894102454",
        appId: "1:484894102454:web:17535ee497eac2d90d6717"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const datePicker = document.getElementById('datePicker');
    const slotsWrapper = document.getElementById('slotsWrapper');
    const slotsGrid = document.getElementById('slotsGrid');
    const loadingStatus = document.getElementById('loadingStatus');

    const today = new Date().toISOString().split('T')[0];
    datePicker.setAttribute('min', today);

    const timeSlots = [];
    for (let h = 8; h <= 17; h++) {
        timeSlots.push(`${String(h).padStart(2, '0')}:00`);
        timeSlots.push(`${String(h).padStart(2, '0')}:30`);
    }

    datePicker.addEventListener('change', async (e) => {
        const selectedDate = e.target.value;
        if (!selectedDate) return;

        const day = new Date(selectedDate).getDay();
        if (day === 0 || day === 6) {
            alert("Please select a weekday (Monday - Friday).");
            e.target.value = '';
            slotsWrapper.style.display = 'none';
            return;
        }

        slotsWrapper.style.display = 'block';
        slotsGrid.innerHTML = '';
        loadingStatus.textContent = 'Checking availability...';

        try {
            const q = query(collection(db, "NGU Interview Times"), where("date", "==", selectedDate));
            const snapshot = await getDocs(q);
            
            const bookedTimes = new Set();
            snapshot.forEach(doc => {
                bookedTimes.add(doc.data().time);
            });

            loadingStatus.textContent = '';

            timeSlots.forEach(time => {
                const btn = document.createElement('button');
                btn.className = 'slot-btn';
                btn.textContent = time;
                
                if (bookedTimes.has(time)) {
                    btn.disabled = true;
                } else {
                    btn.onclick = () => openModal(selectedDate, time);
                }
                
                slotsGrid.appendChild(btn);
            });

            if (timeSlots.every(t => bookedTimes.has(t))) {
                loadingStatus.textContent = 'No slots available on this date.';
            }
        } catch (error) {
            console.error("Error fetching slots:", error);
            loadingStatus.textContent = 'Error checking availability. Please try again.';
        }
    });

    // --- MODAL CONTROLS ---
    window.openModal = function(date, time) {
        document.getElementById('selectedDate').value = date;
        document.getElementById('selectedTime').value = time;
        
        const displayDate = new Date(date).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        document.getElementById('modalTimeDisplay').innerHTML = `<strong>${time}</strong> on <br>${displayDate}`;
        
        document.getElementById('bookingModal').classList.add('active');
        document.getElementById('applicantName').focus();
    };

    window.closeModal = function() {
        document.getElementById('bookingModal').classList.remove('active');
        document.getElementById('applicantName').value = '';
        document.getElementById('applicantEmail').value = '';
        document.getElementById('applicantPosition').value = '';
    };

    window.submitBooking = async function() {
        const name = document.getElementById('applicantName').value.trim();
        const email = document.getElementById('applicantEmail').value.trim();
        const position = document.getElementById('applicantPosition').value.trim();
        const date = document.getElementById('selectedDate').value;
        const time = document.getElementById('selectedTime').value;
        const btn = document.getElementById('confirmBtn');

        if (!name || !email || !position) return alert("Please complete all fields.");

        btn.disabled = true;
        btn.textContent = 'Booking...';

        try {
            const docId = `${date}_${time}`; 
            const docRef = doc(db, "NGU Interview Times", docId);

            const existingDoc = await getDocs(query(collection(db, "NGU Interview Times"), where("date", "==", date), where("time", "==", time)));
            if (!existingDoc.empty) {
                alert("Sorry! Someone just booked this slot. Please select another time.");
                closeModal();
                datePicker.dispatchEvent(new Event('change'));
                return;
            }

            await setDoc(docRef, {
                date: date,
                time: time,
                applicantName: name,
                applicantEmail: email,
                position: position,
                status: "Booked",
                interviewer: null,
                bookedAt: serverTimestamp(),
                applicantReminderSent: false,
                unclaimedReminderLevel: 0
            });

            const displayDate = new Date(date).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            const firstName = name.split(' ')[0];

            // 1. Send Confirmation to Applicant
            const applicantParams = {
                to_email: email,
                first_name: firstName,
                job_title: position,
                interview_date: displayDate,
                interview_time: time,
                location_method: 'Microsoft Teams',
                meeting_link: 'A link will be provided by your interviewer shortly',
                duration: '30',
                interviewer_name: 'a member of our team',
                contact_email: 'recruitment@next-gen.uk'
            };

            // 2. Send Alert to FTLs
            const ftlParams = {
                applicant_name: name,
                interview_date: displayDate,
                interview_time: time,
                portal_link: window.location.origin + "/FTL-interview-availability.html"
            };

            await Promise.allSettled([
                emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_APPLICANT_CONFIRM, applicantParams),
                emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_FTL_TEMPLATE, ftlParams)
            ]);

            closeModal();
            document.getElementById('bookingContainer').style.display = 'none';
            document.getElementById('successScreen').style.display = 'block';
            
            document.getElementById('successMsg').innerHTML = `Your interview has been booked for <strong>${time}</strong> on <strong>${displayDate}</strong>.<br><br>We look forward to speaking with you, ${firstName}!`;

        } catch (error) {
            console.error("Booking Error:", error);
            alert("An error occurred. Please try again.");
            btn.disabled = false;
            btn.textContent = 'Confirm Interview';
        }
    };
</script>
</body>
</html>
