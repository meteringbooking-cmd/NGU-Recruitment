    <style>
        :root {
            --body-bg: #141d26;
            --container-bg: #1c2938;
            --input-bg: #2d3d50;
            --panel-border: #38444d;
            --primary-text: #e1e8ed;
            --secondary-text: #8899a6;
            --accent-color: #00d4ff; 
            --success-color: #2ecc71;
            --danger-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--body-bg);
            color: var(--primary-text);
            line-height: 1.6;
        }

        .main-container {
            display: flex; flex-direction: column;
            height: 100vh; padding: 16px 20px;
            gap: 14px; overflow: hidden;
        }

        .page-header {
            background-color: var(--container-bg); padding: 14px 22px; border-radius: 12px;
            border: 1px solid var(--panel-border); display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            flex-wrap: wrap; gap: 12px; flex-shrink: 0;
        }

        .header-brand-container { display: flex; align-items: center; gap: 20px; }
        .header-brand { display: flex; align-items: center; gap: 15px; }
        .logo { height: 40px; width: auto; }

        .page-header h1 { font-size: 1.4em; color: var(--primary-text); text-transform: uppercase; letter-spacing: 0.1em; margin: 0; }

        .btn-link {
            border-radius: 4px; cursor: pointer; font-size: 0.85em; transition: all 0.2s;
            text-decoration: none; display: inline-flex; align-items: center; font-weight: 600;
            border: 1px solid var(--panel-border); background-color: var(--input-bg); color: var(--primary-text); padding: 8px 15px;
        }
        .btn-link:hover { background-color: #38444d; border-color: #4f5b66; }

        #status-message {
            text-align: center; padding: 40px; color: var(--secondary-text); background-color: var(--container-bg);
            border-radius: 8px; border: 1px solid var(--panel-border); max-width: 800px; margin: 0 auto;
        }

        .vacancy-scroll { flex: 1; overflow-y: auto; min-height: 0; }
        .vacancy-scroll::-webkit-scrollbar { width: 4px; }
        .vacancy-scroll::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }

        .vacancy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; padding: 4px 2px; }

        .vacancy-card {
            background-color: var(--container-bg); border: 1px solid var(--panel-border); border-top: 4px solid var(--success-color);
            border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: transform 0.2s ease;
        }
        .vacancy-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }

        .card-header { padding: 20px; border-bottom: 1px solid var(--panel-border); background-color: rgba(0,0,0,0.1); position: relative; }
        .card-title { font-size: 1.2em; color: var(--accent-color); font-weight: 700; margin-bottom: 5px; padding-right: 40px; }
        .card-dept { font-size: 0.9em; color: var(--secondary-text); text-transform: uppercase; letter-spacing: 0.05em; }

        .card-body { padding: 20px; flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .info-block label { display: block; color: var(--secondary-text); font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
        .info-block .value { color: var(--primary-text); font-size: 0.95em; font-weight: 500; }

        .advert-toggles { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .toggle-row { display: flex; align-items: center; justify-content: space-between; background-color: var(--input-bg); padding: 10px 15px; border-radius: 6px; border: 1px solid var(--panel-border); }
        .toggle-row label { font-size: 0.9em; color: var(--primary-text); cursor: pointer; user-select: none; display: flex; align-items: center; gap: 10px; }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--success-color); cursor: pointer; }

        .saving-indicator { font-size: 0.75em; color: var(--accent-color); opacity: 0; transition: opacity 0.3s; }
        .saving-indicator.show { opacity: 1; }

        .btn-close-vacancy {
            width: 100%; padding: 10px; background-color: transparent; border: 1px solid var(--danger-color); color: var(--danger-color);
            border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.05em;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;

        .applicant-badge {

            padding: 6px 12px; border-radius: 6px; font-size: 0.85em; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;

        @media (max-width: 768px) {

        /* Contract filter pills */

        .contract-pill {

            color: var(--accent-color); font-size: 0.75em; font-weight: 700;

        /* Inline contract editor — sits in card body */
        .contract-edit-row {
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            background-color: var(--input-bg); padding: 10px 15px;

        .contract-edit-row select option { background: #2d3d50; color: var(--primary-text); font-weight: normal; }

        /* Match Drawer */
        .match-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.55);
            backdrop-filter: blur(3px); z-index: 200;
            opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        .match-overlay.open { opacity: 1; pointer-events: all; }

        .match-drawer {
            position: fixed; top: 0; right: -420px; width: 400px; height: 100%;
            background: #1c2938; border-left: 1px solid var(--panel-border);
            z-index: 201; display: flex; flex-direction: column;
            box-shadow: -8px 0 32px rgba(0,0,0,0.4);
            transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .match-drawer.open { right: 0; }

        .match-drawer-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 22px; border-bottom: 1px solid var(--panel-border);
            background: rgba(0,0,0,0.15); flex-shrink: 0;
        }
        .match-drawer-header h3 { margin: 0; font-size: 1rem; color: var(--accent-color); font-weight: 700; }
        .match-drawer-header p { margin: 2px 0 0; font-size: 0.78rem; color: var(--secondary-text); }
        .match-close-btn {
            background: rgba(255,255,255,0.06); border: 1px solid var(--panel-border);
            color: var(--secondary-text); width: 30px; height: 30px;
            border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; flex-shrink: 0;
        }
        .match-close-btn:hover { background: rgba(255,255,255,0.12); color: var(--primary-text); }

        .match-drawer-body { flex: 1; overflow-y: auto; padding: 16px; }
        .match-drawer-body::-webkit-scrollbar { width: 4px; }
        .match-drawer-body::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }

        .match-row {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.2); border: 1px solid var(--panel-border);
            border-radius: 8px; padding: 12px 14px; margin-bottom: 10px;
            transition: border-color 0.15s;
        }
        .match-row:hover { border-color: var(--accent-color); }
        .match-row-name { font-size: 0.92rem; font-weight: 700; color: var(--primary-text); }
        .match-row-role { font-size: 0.78rem; color: var(--secondary-text); margin-top: 2px; }
        .match-row-pc {
            background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3);
            color: var(--accent-color); font-size: 0.75rem; font-weight: 700;
            padding: 4px 10px; border-radius: 20px; white-space: nowrap; letter-spacing: 0.04em;
        }
        .match-dist {
            font-size: 0.7rem; color: #6ee7b7; margin-top: 3px; text-align: right;
        }
        .match-empty {
            text-align: center; color: var(--secondary-text);
            padding: 40px 20px; font-size: 0.9rem; font-style: italic;
        }
    </style>
</head>
<body>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
        authDomain: "oesperformance-a54c0.firebaseapp.com",
        projectId: "oesperformance-a54c0",
        storageBucket: "oesperformance-a54c0.firebasestorage.app",
        messagingSenderId: "484894102454",
        appId: "1:484894102454:web:17535ee497eac2d90d6717",
        measurementId: "G-R56BGZYV8N"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const collectionName = "NGU Recuitment Approval Form";
    const appsCollection = "NGUO New Applicants";

    const gridContainer = document.getElementById('vacancy-grid');
    const statusMsg = document.getElementById('status-message');

    let activeVacancies = [];
    let allApplications = [];
    let activeContractFilter = 'all';

    window.setFilter = function(contract) {
        activeContractFilter = contract;
        // Update pill active states
        document.querySelectorAll('.filter-pill').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.contract === contract);
        });
        renderGrid();
    };

    const safeStr = (val) => val || 'Not specified';
    const formatDate = (dateString) => {
        if (!dateString) return 'Not specified';
        const d = new Date(dateString);
        if (isNaN(d.getTime())) return dateString; 
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    };

    // --- AREA PREFIX EXTRACTOR ---
    // Grabs ONLY the starting letters (e.g. "NE8 3TS" -> "NE", "B1 1AA" -> "B")
    function getPostcodeArea(str) {
        if (!str || typeof str !== 'string') return '';
        const match = str.trim().match(/^[a-zA-Z]+/);
        return match ? match[0].toUpperCase() : '';
    }

    // --- OUTCODE EXTRACTOR (e.g. "NE8 3TS" -> "NE8", "SW1A 1AA" -> "SW1A") ---
    function getOutcode(str) {
        if (!str || typeof str !== 'string') return '';
        const m = str.trim().match(/^([A-Z]{1,2}\d{1,2}[A-Z]?)/i);
        return m ? m[1].toUpperCase() : '';
    }

    // --- ENERGISE OUTCODE RESOLVER ---
    // Energise stores locations as bare area letters ("NE", "AB", "SW1").
    // If there are no digits, we append "1" to make a valid geocodable outcode
    // ("NE" -> "NE1", "AB" -> "AB1"). Used only for Energise geo lookups;
    // the original value is still displayed to the user.
    function getEnergiseOutcode(location) {
        if (!location || typeof location !== 'string') return '';
        const str = location.trim().toUpperCase();
        // Already a valid outcode with digits (e.g. "NE8", "SW1A")
        const outcode = getOutcode(str);
        if (outcode) return outcode;
        // Bare area letters only (e.g. "NE", "AB", "M") — append "1"
        if (/^[A-Z]{1,2}$/.test(str)) return str + '1';
        return '';
    }

    // --- HAVERSINE DISTANCE (miles) ---
    function haversine(lat1, lon1, lat2, lon2) {
        const R = 3958.8;
        const toRad = d => d * Math.PI / 180;
        const dLat = toRad(lat2 - lat1);
        const dLon = toRad(lon2 - lon1);
        const a = Math.sin(dLat/2)**2 +
                  Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // --- GEOCODE CACHE & BATCH LOOKUP (outcodes via postcodes.io) ---
    // Stores outcode -> { lat, lng } or null
    const geoCache   = {};  // postcode outcodes
    const placeCache = {};  // place names (Nominatim)

    async function batchGeocode(outcodes) {
        const needed = [...new Set(outcodes)].filter(o => o && !Object.prototype.hasOwnProperty.call(geoCache, o));
        if (!needed.length) return;
        needed.forEach(o => { geoCache[o] = null; });
        await Promise.all(needed.map(async outcode => {
            try {
                const res  = await fetch(`https://api.postcodes.io/outcodes/${encodeURIComponent(outcode)}`);
                const json = await res.json();
                if (json.status === 200 && json.result) {
                    geoCache[outcode] = { lat: json.result.latitude, lng: json.result.longitude };
                }
            } catch(e) {}
        }));
    }

    // Geocode a free-text UK place name via postcodes.io /places
    // (CORS-friendly, no rate limits, UK-specific — replaces Nominatim)
    async function geocodePlace(name) {
        const key = name.trim().toLowerCase();
        if (!key) return null;
        if (Object.prototype.hasOwnProperty.call(placeCache, key)) return placeCache[key];
        placeCache[key] = null; // mark in-flight

        const tryPlace = async (q) => {
            try {
                const r = await fetch(`https://api.postcodes.io/places?q=${encodeURIComponent(q)}&limit=1`);
                const j = await r.json();
                if (j.status === 200 && j.result && j.result.length > 0) {
                    return { lat: j.result[0].latitude, lng: j.result[0].longitude };
                }
            } catch(e) {}
            return null;
        };

        let coords = await tryPlace(name.trim());
        if (!coords) {
            // Fallback: try just the last word (e.g. "North London" -> "London")
            const lastWord = name.trim().split(/\s+/).pop();
            if (lastWord && lastWord.toLowerCase() !== key) {
                coords = await tryPlace(lastWord);
            }
        }
        placeCache[key] = coords;
        return placeCache[key];
    }

    // Unified geocoder: returns { lat, lng } or null
    // - If the string looks like a postcode outcode (NE8, SW1A, M1…) -> postcodes.io
    // - Otherwise -> Nominatim place-name lookup
    async function geocodeLocation(str) {
        if (!str) return null;
        const outcode = getOutcode(str.trim());
        if (outcode) {
            if (!Object.prototype.hasOwnProperty.call(geoCache, outcode)) await batchGeocode([outcode]);
            return geoCache[outcode];
        }
        return geocodePlace(str.trim());
    }

    // ── DEBOUNCED RENDER SCHEDULER ────────────────────────────────────
    // Prevents the race condition where two simultaneous onSnapshot
    // callbacks both call geocodeAndRender, causing one to render with
    // in-flight null coords and show zero matches.
    // ─────────────────────────────────────────────────────────
    let _renderTimer   = null;
    let _renderRunning = false;
    let _renderQueued  = false;

    function scheduleRender() {
        // Debounce: collapse rapid successive calls into one
        clearTimeout(_renderTimer);
        _renderTimer = setTimeout(runGeocodeAndRender, 150);
    }

    async function runGeocodeAndRender() {
        if (_renderRunning) {
            // Another geocode pass is in progress; queue one more run for when it finishes
            _renderQueued = true;
            return;
        }
        _renderRunning = true;
        _renderQueued  = false;
        try {
            await geocodeAndRender();
        } finally {
            _renderRunning = false;
            if (_renderQueued) scheduleRender(); // run the queued pass
        }
    }

    async function geocodeAndRender() {
        const distanceContracts = ['Energise', 'ImServe'];

        // Collect geocoding tasks — Energise uses synthetic outcodes, ImServe uses place names
        const energiseOutcodes = [];
        const imServePlaces    = [];
        activeVacancies
            .filter(v => distanceContracts.includes(v.requestInformation?.contract || ''))
            .forEach(v => {
                const loc      = v.requestInformation?.location || '';
                const contract = v.requestInformation?.contract || '';
                if (contract === 'Energise') {
                    const oc = getEnergiseOutcode(loc);
                    if (oc) energiseOutcodes.push(oc);
                } else if (contract === 'ImServe') {
                    if (loc) imServePlaces.push(loc);
                }
            });

        // Applicant outcodes (all distance-based contracts need these)
        const appOutcodes = allApplications
            .map(a => getOutcode(a.personalDetails?.postcode || ''))
            .filter(Boolean);

        // Geocode applicant outcodes + Energise vacancy outcodes in parallel (postcodes.io)
        const uniqueEnergiseOcs = [...new Set(energiseOutcodes)];
        const allOutcodes = [...new Set([...appOutcodes, ...uniqueEnergiseOcs])];
        if (allOutcodes.length) await batchGeocode(allOutcodes);

        // Some postcode areas use 2-digit districts (e.g. AB uses AB10-AB99, not AB1).
        // For any Energise outcode that returned null, retry with a "10" suffix.
        for (const oc of uniqueEnergiseOcs) {
            if (geoCache[oc]) continue; // already resolved
            const letters = oc.replace(/\d+$/, ''); // strip trailing digit(s) -> "AB"
            const alt     = letters + '10';           // try "AB10"
            if (alt === oc) continue;
            if (!Object.prototype.hasOwnProperty.call(geoCache, alt)) await batchGeocode([alt]);
            if (geoCache[alt]) geoCache[oc] = geoCache[alt]; // alias result to original key
        }

        // Geocode ImServe place names sequentially (one API call each)
        for (const loc of [...new Set(imServePlaces)]) {
            await geocodePlace(loc);
        }

        renderGrid();
    }

    // 1. Listen to Applications (Filter to ACTIVE ONLY)
    db.collection(appsCollection).onSnapshot((snapshot) => {
        allApplications = [];
        snapshot.forEach(doc => {
            const app = doc.data();
            
            // Define what makes an application "Inactive"
            const isArchived = app.archived === true || app.isArchived === true || app.status === 'Archived';
            const isRejected = app.status === 'Rejected' || app.status === 'Declined';
            const isHired = app.contractAccepted === true || app.offerAccepted === true || app.onboardingCompleted === true;
            
            // Only push to array if they are an active candidate looking for a role
            if (!isArchived && !isRejected && !isHired) {
                allApplications.push(app);
            }
        });
        scheduleRender();
    });

    // 2. Listen to active workflows (Vacancies)
    db.collection(collectionName)
      .where('workflowClosed', '==', false)
      .onSnapshot((snapshot) => {
          activeVacancies = [];
          snapshot.forEach(doc => {
              const data = doc.data();
              const approvals = data.approvalSignOff || {};
              const isLive = approvals.departmentHead?.decision === 'Approve' &&
                             approvals.finance?.decision === 'Approve' &&
                             approvals.finalApprover?.decision === 'Approve';

              if (isLive) {
                  activeVacancies.push({ id: doc.id, ...data });
              }
          });
          scheduleRender();
      }, (error) => {
          console.error("Error fetching live vacancies: ", error);
          statusMsg.innerHTML = `<span style="color:var(--danger-color)">Error loading data. Check console.</span>`;
      });

    // Main Render Function
    function renderGrid() {
        gridContainer.innerHTML = '';

        // Apply contract filter
        const filtered = activeContractFilter === 'all'
            ? activeVacancies
            : activeVacancies.filter(v =>
                (v.requestInformation?.contract || '') === activeContractFilter
              );

        // Still waiting for first vacancy snapshot — keep the loading spinner
        if (activeVacancies.length === 0 && allApplications.length === 0) {
            return;
        }

        if (activeVacancies.length === 0) {
            statusMsg.textContent = 'No fully approved live vacancies found.';
            statusMsg.style.display = 'block';
            gridContainer.style.display = 'none';
            return;
        }

        if (filtered.length === 0) {
            statusMsg.textContent = `No live vacancies for ${activeContractFilter}.`;
            statusMsg.style.display = 'block';
            gridContainer.style.display = 'none';
            return;
        }

        statusMsg.style.display = 'none';
        gridContainer.style.display = 'grid';

        // Sort alphabetically by desired location
        filtered.sort((a, b) => {
            const locA = (a.requestInformation?.location || '').trim().toLowerCase();
            const locB = (b.requestInformation?.location || '').trim().toLowerCase();
            return locA.localeCompare(locB);
        });

        filtered.forEach(vacancy => {
            const rawJobTitle = vacancy.requestInformation?.jobTitle || '';
            const dept        = safeStr(vacancy.requestInformation?.department);
            const contract    = vacancy.requestInformation?.contract || '';

            // Format for safe matching
            const safeVacPos   = rawJobTitle.trim().toLowerCase();
            const rawLocation  = vacancy.requestInformation?.location || ''; // raw, for geocache key consistency
            const locationStr  = rawLocation || 'Not specified';              // display string
            const vacArea      = getPostcodeArea(locationStr);
            const vacOutcode   = getOutcode(rawLocation);
            const isEnergise   = contract === 'Energise';
            const isImServe    = contract === 'ImServe';
            const useDistance  = isEnergise || isImServe;
            let matchCount     = 0;

            // Resolve vacancy coords
            // Energise: use synthetic outcode ("NE" -> "NE1") for centre-point geocoding
            // ImServe:  use place name cache
            const energiseOc = isEnergise ? getEnergiseOutcode(rawLocation) : '';
            let vacCoords = null;
            if (isEnergise && energiseOc) {
                vacCoords = geoCache[energiseOc] || null;
            }
            if (isImServe) {
                const placeKey = rawLocation.trim().toLowerCase();
                vacCoords = placeCache[placeKey] || (energiseOc ? geoCache[energiseOc] : null) || null;
            }

            // Build matched applicants list alongside the count
            const matchedApplicants = [];

            allApplications.forEach(app => {
                const safeAppPos = (app.position || '').trim().toLowerCase();
                if (safeAppPos !== safeVacPos) return; // position must match

                let isMatch = false;
                let distMiles = null;

                if (useDistance) {
                    const appOutcode = getOutcode(app.personalDetails?.postcode || '');
                    const appCoords  = appOutcode ? geoCache[appOutcode] : null;

                    if (vacCoords && appCoords) {
                        // Both geocoded — use Haversine distance
                        const d = haversine(vacCoords.lat, vacCoords.lng, appCoords.lat, appCoords.lng);
                        if (d <= 20) { isMatch = true; distMiles = Math.round(d * 10) / 10; }
                    } else if (isEnergise && !vacCoords) {
                        // Energise geocoding failed (e.g. AB1 not a valid outcode) —
                        // fall back to prefix match: does applicant's area code start with vacancy area?
                        const areaCode = getPostcodeArea(rawLocation);  // "AB" from "AB"
                        const appArea  = getPostcodeArea(app.personalDetails?.postcode || '');
                        if (areaCode && appArea === areaCode) isMatch = true;
                    }
                    // ImServe with no coords: geocoding still pending, skip for now
                } else {
                    const appArea = getPostcodeArea(app.personalDetails?.postcode);
                    if (appArea === vacArea && vacArea !== '') isMatch = true;
                }

                if (isMatch) {
                    matchCount++;
                    matchedApplicants.push({
                        name:     app.fullName || 'Unknown',
                        postcode: app.personalDetails?.postcode || '—',
                        position: app.position || '—',
                        dist:     distMiles
                    });
                }
            });

            // Store for drawer access
            vacMatchMap[vacancy.id] = { applicants: matchedApplicants, title: rawJobTitle, location: locationStr, contract };

            const matchLabel = useDistance ? 'within 20 mi' : 'Area Match';

            const dateApproved = vacancy.finalOutcome?.dateApproved || vacancy.approvalSignOff?.finalApprover?.date;
            const desiredStart = vacancy.recruitmentRequirements?.desiredStartDate;
            const externalReq = vacancy.recruitmentRequirements?.externalAdvertRequired === 'Yes';
            const internalReq = vacancy.recruitmentRequirements?.internalAdvertRequired === 'Yes';
            const advertStatus = vacancy.advertStatus || {};

            let advertHtml = '';
            if (externalReq) {
                advertHtml += `
                    <div class="toggle-row">
                        <label><input type="checkbox" onchange="updateAdvert(this, '${vacancy.id}', 'linkedinLive')" ${advertStatus.linkedinLive ? 'checked' : ''}> LinkedIn Advert Live</label>
                        <span class="saving-indicator" id="save-ind-linkedinLive-${vacancy.id}">Saved ✓</span>
                    </div>
                    <div class="toggle-row">
                        <label><input type="checkbox" onchange="updateAdvert(this, '${vacancy.id}', 'indeedLive')" ${advertStatus.indeedLive ? 'checked' : ''}> Indeed Advert Live</label>
                        <span class="saving-indicator" id="save-ind-indeedLive-${vacancy.id}">Saved ✓</span>
                    </div>
                `;
            }
            if (internalReq) {
                advertHtml += `
                    <div class="toggle-row">
                        <label><input type="checkbox" onchange="updateAdvert(this, '${vacancy.id}', 'internalEmailSent')" ${advertStatus.internalEmailSent ? 'checked' : ''}> Internal Email Distributed</label>
                        <span class="saving-indicator" id="save-ind-internalEmailSent-${vacancy.id}">Saved ✓</span>
                    </div>
                `;
            }
            if (!externalReq && !internalReq) {
                advertHtml = `<div style="color: var(--secondary-text); font-size: 0.9em; font-style: italic;">No advertising required specified on form.</div>`;
            }

            const badgeClass = matchCount > 0 ? 'applicant-badge' : 'applicant-badge empty';
            const areaRef    = isEnergise ? (vacOutcode || vacArea) : vacArea;
            const badgeText  = matchCount === 1
                ? `1 ${matchLabel} (${areaRef})`
                : `${matchCount} ${matchLabel}${matchCount !== 1 ? 'es' : ''} (${areaRef})`;
            const badgeIcon  = matchCount > 0 ? '\uD83D\uDCCD ' : '';
            const badgeHtml  = matchCount > 0
                ? `<div class="${badgeClass}" onclick="openMatchDrawer('${vacancy.id}')" style="cursor:pointer;" title="Click to view matched applicants">${badgeIcon}${badgeText}</div>`
                : `<div class="${badgeClass}">${badgeText}</div>`;

            const cardHtml = `
                <div class="vacancy-card" id="card-${vacancy.id}">
                    <div class="card-header">
                        <div class="card-title">${safeStr(rawJobTitle)}</div>
                        <div class="card-dept">${dept}</div>
                        ${contract ? `<div class="contract-pill">📋 ${contract}</div>` : ''}
                        ${badgeHtml}
                    </div>
                    <div class="card-body">
                        <div class="info-block full-width">
                            <label>Desired Location</label>
                            <div class="value">${locationStr}</div>
                        </div>
                        <div class="info-block full-width">
                            <label>Contract</label>
                            <div class="contract-edit-row">
                                <select id="contract-sel-${vacancy.id}" onchange="updateContract(this, '${vacancy.id}')">
                                    <option value="">— Not set —</option>
                                    <option value="Energise"  ${contract === 'Energise'  ? 'selected' : ''}>Energise</option>
                                    <option value="SureServe" ${contract === 'SureServe' ? 'selected' : ''}>SureServe</option>
                                    <option value="Callisen"  ${contract === 'Callisen'  ? 'selected' : ''}>Callisen</option>
                                    <option value="ImServe"   ${contract === 'ImServe'   ? 'selected' : ''}>ImServe</option>
                                </select>
                                <span class="saving-indicator" id="save-ind-contract-${vacancy.id}">Saved ✓</span>
                            </div>
                        </div>
                        <div class="info-block">
                            <label>Date Approved</label>
                            <div class="value">${formatDate(dateApproved)}</div>
                        </div>
                        <div class="info-block">
                            <label>Desired Start Date</label>
                            <div class="value">${formatDate(desiredStart)}</div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="footer-title">Advert Tracking</div>
                        <div class="advert-toggles">
                            ${advertHtml}
                        </div>
                        <button class="btn-close-vacancy" onclick="closeVacancy('${vacancy.id}')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                            Close Vacancy
                        </button>
                    </div>
                </div>
            `;
            gridContainer.insertAdjacentHTML('beforeend', cardHtml);
        });
    }

    // Matched applicants map: vacancyId -> { applicants, title, location, contract }
    const vacMatchMap = {};

    window.openMatchDrawer = function(vacancyId) {
        const data = vacMatchMap[vacancyId];
        if (!data) return;

        document.getElementById('drawerVacTitle').textContent = data.title || 'Matched Applicants';
        document.getElementById('drawerVacMeta').textContent  = `${data.location}${data.contract ? '  ·  ' + data.contract : ''}`;

        const body = document.getElementById('drawerMatchBody');
        body.innerHTML = '';

        if (!data.applicants.length) {
            body.innerHTML = '<div class="match-empty">No matched applicants found.</div>';
        } else {
            data.applicants.forEach(a => {
                const distHtml = a.dist !== null ? `<div class="match-dist">${a.dist} miles away</div>` : '';
                const row = document.createElement('div');
                row.className = 'match-row';
                row.innerHTML = `
                    <div>
                        <div class="match-row-name">${a.name}</div>
                        <div class="match-row-role">${a.position}</div>
                    </div>
                    <div style="text-align:right;">
                        <div class="match-row-pc">${a.postcode}</div>
                        ${distHtml}
                    </div>
                `;
                body.appendChild(row);
            });
        }

        document.getElementById('matchDrawer').classList.add('open');
        document.getElementById('matchOverlay').classList.add('open');
    };

    window.closeMatchDrawer = function() {
        document.getElementById('matchDrawer').classList.remove('open');
        document.getElementById('matchOverlay').classList.remove('open');
    };

    async function updateAdvert(checkboxElement, reqId, fieldName) {
        const isChecked = checkboxElement.checked;
        const indicator = document.getElementById(`save-ind-${fieldName}-${reqId}`);
        indicator.textContent = 'Saving...'; indicator.classList.add('show');
        try {
            await db.collection(collectionName).doc(reqId).set({ advertStatus: { [fieldName]: isChecked } }, { merge: true });
            indicator.textContent = 'Saved ✓'; setTimeout(() => { indicator.classList.remove('show'); }, 2000);
        } catch (error) {
            indicator.textContent = 'Error!'; indicator.style.color = 'var(--danger-color)';
            checkboxElement.checked = !isChecked; setTimeout(() => { indicator.classList.remove('show'); indicator.style.color = 'var(--accent-color)'; }, 3000);
        }
    }

    async function updateContract(selectEl, reqId) {
        const value     = selectEl.value;
        const indicator = document.getElementById(`save-ind-contract-${reqId}`);
        // Also update the pill in the card header
        const pill = document.querySelector(`#card-${reqId} .contract-pill`);

        indicator.textContent = 'Saving…'; indicator.classList.add('show');
        try {
            await db.collection(collectionName).doc(reqId).update({
                'requestInformation.contract': value
            });
            indicator.textContent = 'Saved ✓';
            // Update pill
            if (pill) {
                pill.textContent = value ? `📋 ${value}` : '';
                pill.style.display = value ? '' : 'none';
            }
            setTimeout(() => { indicator.classList.remove('show'); }, 2000);
        } catch (err) {
            indicator.textContent = 'Error!';
            indicator.style.color = 'var(--danger-color)';
            setTimeout(() => { indicator.classList.remove('show'); indicator.style.color = 'var(--accent-color)'; }, 3000);
        }
    }

    async function closeVacancy(reqId) {
        if (!confirm("Are you sure you want to close this vacancy? This will archive the role and remove it from the live board.")) return;
        try {
            await db.collection(collectionName).doc(reqId).update({
                workflowClosed: true, vacancyClosedAt: new Date().toISOString(), vacancyClosedBy: localStorage.getItem('ngu_portal_username') || 'Unknown User'
            });
        } catch (error) { alert("Failed to close vacancy. Please check your connection and try again."); }
    }
</script>
</body>
</html>
