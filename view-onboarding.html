<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NGU — Onboarding Review Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #005EB8; --accent: #00A3E0;
            --bg-dark: #0A1628; --bg-card: #1a2942; --bg-input: #0d1f3a;
            --text-light: #E8EDF2; --text-muted: #8B9AAE; --border: #2a3f5f;
            --success: #10B981; --error: #EF4444; --warning: #F59E0B;
            --sidebar-width: 340px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Work Sans', sans-serif; background: var(--bg-dark); color: var(--text-light); height: 100vh; display: flex; overflow: hidden; }
        
        .sidebar { width: var(--sidebar-width); background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border); background: #111d31; }
        .logo { max-height: 40px; display: block; margin-bottom: 1rem; }
        .sidebar-header h2 { font-size: 1.2rem; color: var(--accent); }
        
        .search-wrap { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--bg-dark); }
        .search-input-row { display: flex; align-items: center; gap: 8px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 0 10px; transition: border-color 0.2s; }
        .search-input-row:focus-within { border-color: var(--accent); }
        .search-input-row input { flex: 1; background: none; border: none; outline: none; color: var(--text-light); font-family: inherit; font-size: 0.88rem; padding: 0.6rem 0; }
        
        .applicant-list { flex: 1; overflow-y: auto; padding: 1rem; }
        .applicant-item { background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 0.8rem; cursor: pointer; transition: all 0.2s; }
        .applicant-item:hover, .applicant-item.active { border-color: var(--accent); background: rgba(0, 163, 224, 0.1); }
        .app-name { font-weight: 700; font-size: 1.05rem; margin-bottom: 0.2rem; }
        .app-pos { font-size: 0.85rem; color: var(--accent); margin-bottom: 0.4rem; }
        
        .status-badge { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 5px; }
        .status-pending { background: rgba(245, 158, 11, 0.15); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.4); }
        .status-submitted { background: rgba(16, 185, 129, 0.15); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.4); }
        .status-processed { background: rgba(0, 163, 224, 0.15); color: var(--accent); border: 1px solid rgba(0, 163, 224, 0.4); }

        .main-content { flex: 1; overflow-y: auto; padding: 2rem 3rem; background: linear-gradient(135deg, var(--bg-dark) 0%, #0d1f3a 100%); }
        .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 1.2rem; }
        
        .app-header { margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: flex-end; }
        .app-header h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
        .app-header .role-badge { display: inline-block; background: rgba(0,163,224,0.15); color: var(--accent); padding: 0.4rem 1rem; border-radius: 20px; font-weight: 600; font-size: 0.9rem; }
        
        .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.8rem; margin-bottom: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .section h3 { font-size: 1.2rem; color: var(--accent); margin-bottom: 1.2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; display: flex; align-items: center; justify-content: space-between; gap: 8px;}
        
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem 2rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem 2rem; }
        
        .data-group { margin-bottom: 1rem; }
        .data-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; font-weight: 600; }
        .data-value { font-size: 1rem; color: var(--text-light); word-break: break-word; }
        .data-value.mono { font-family: 'DM Mono', monospace; font-size: 1.1rem; letter-spacing: 0.05em; color: white; }
        
        .missing-data { color: var(--warning); font-style: italic; font-size: 0.9rem; font-weight: 500; }
        .signature-img { max-height: 80px; background: white; padding: 5px; border-radius: 4px; border: 1px solid var(--border); margin-top: 5px; }

        .btn-action { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.4); color: #6ee7b7; padding: 0.8rem 1.5rem; border-radius: 8px; font-size: 1rem; font-weight: 700; transition: all 0.2s; cursor: pointer; }
        .btn-action:hover { background: rgba(16, 185, 129, 0.2); transform: translateY(-2px); }

        .btn-download { display: inline-flex; align-items: center; justify-content: center; background: rgba(0, 163, 224, 0.1); border: 1px solid rgba(0, 163, 224, 0.4); color: var(--accent); padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; text-decoration: none; transition: all 0.2s; margin-top: 0.5rem;}
        .btn-download:hover { background: rgba(0, 163, 224, 0.2); }

        .btn-hmrc { display: inline-flex; align-items: center; gap: 6px; background: rgba(0, 163, 224, 0.12); border: 1px solid var(--accent); color: var(--accent); padding: 0.45rem 0.9rem; border-radius: 6px; font-size: 0.8rem; font-weight: 700; text-decoration: none; cursor: pointer; transition: all 0.2s; }
        .btn-hmrc:hover { background: rgba(0, 163, 224, 0.22); transform: translateY(-1px); }
        
        .banner-warning { background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); padding: 1rem; border-radius: 8px; color: #fcd34d; margin-bottom: 1.5rem; font-weight: 600; }
        .doc-item { background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 0.8rem; display: flex; justify-content: space-between; align-items: center; }

        .holiday-chip { display: inline-block; background: rgba(245, 158, 11, 0.15); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3); padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; margin-right: 8px; margin-bottom: 8px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://www.dropbox.com/scl/fi/kkujm1u6y7vvnp7luq8d7/ngu-main-white.png?rlkey=kgq2uh48qh4xssh4vlbz868lr&raw=1" alt="NGU Logo" class="logo">
            <h2>Onboarding Review Hub</h2>
            <a href="view-applications.html" style="display:inline-block; margin-top:0.5rem; color:var(--accent); text-decoration:none; font-size:0.85rem; font-weight:600; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--accent); transition: all 0.2s;" onmouseover="this.style.background='rgba(0,163,224,0.1)'" onmouseout="this.style.background='transparent'">&larr; Switch to Applicant Portal</a>
        </div>
        
        <div class="search-wrap">
            <div class="search-input-row">
                🔍 <input type="text" id="nameSearch" placeholder="Search onboardings…" autocomplete="off">
            </div>
        </div>

        <div class="applicant-list" id="applicantList">
            <div class="empty-state" style="font-size: 1rem;">Loading records...</div>
        </div>
    </aside>

    <main class="main-content" id="mainContent">
        <div class="empty-state">Select an onboarding profile from the sidebar to review details.</div>
    </main>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore, collection, query, onSnapshot, where, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
        authDomain: "oesperformance-a54c0.firebaseapp.com",
        projectId: "oesperformance-a54c0",
        storageBucket: "oesperformance-a54c0.firebasestorage.app",
        messagingSenderId: "484894102454",
        appId: "1:484894102454:web:17535ee497eac2d90d6717"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let applicationsData = [];
    let searchQuery = '';
    let selectedAppId = null;

    document.getElementById('nameSearch').addEventListener('input', (e) => {
        searchQuery = e.target.value.trim().toLowerCase();
        renderSidebar();
    });

    // Fetch ONLY applicants who have successfully accepted their contract
    const qApp = query(collection(db, "NGUO New Applicants"), where("contractAccepted", "==", true));
    
    onSnapshot(qApp, (snapshot) => {
        applicationsData = [];
        snapshot.forEach(doc => applicationsData.push({ id: doc.id, ...doc.data() }));
        
        applicationsData.sort((a, b) => {
            if (a.onboardingProcessed && !b.onboardingProcessed) return 1;
            if (!a.onboardingProcessed && b.onboardingProcessed) return -1;
            if (a.onboardingCompleted && !b.onboardingCompleted) return -1;
            if (!a.onboardingCompleted && b.onboardingCompleted) return 1;
            return 0;
        });

        renderSidebar();
        
        if (selectedAppId) {
            const updatedApp = applicationsData.find(a => a.id === selectedAppId);
            if (updatedApp) renderDetails(updatedApp);
        }
    });

    function renderSidebar() {
        const listEl = document.getElementById('applicantList');
        listEl.innerHTML = '';

        let filteredApps = applicationsData;
        if (searchQuery) {
            filteredApps = filteredApps.filter(app => {
                const name = app.fullName || `${app.personalDetails?.forename || ''} ${app.personalDetails?.surname || ''}`;
                return name.toLowerCase().includes(searchQuery);
            });
        }

        if (filteredApps.length === 0) {
            listEl.innerHTML = `<div class="empty-state" style="font-size: 0.9rem;">No active onboardings found.</div>`;
            return;
        }

        filteredApps.forEach((app) => {
            let statusBadge = '';
            if (app.onboardingProcessed) {
                statusBadge = `<span class="status-badge status-processed">✓ HR Processed</span>`;
            } else if (app.onboardingCompleted) {
                statusBadge = `<span class="status-badge status-submitted">🟢 Data Submitted</span>`;
            } else {
                statusBadge = `<span class="status-badge status-pending">🟡 Pending Forms</span>`;
            }

            const div = document.createElement('div');
            div.className = 'applicant-item';
            if (selectedAppId === app.id) div.classList.add('active');

            const computedFullName = app.fullName || `${app.personalDetails?.forename || ''} ${app.personalDetails?.surname || ''}`.trim() || 'Unknown Applicant';

            div.innerHTML = `
                <div class="app-name">${computedFullName}</div>
                <div class="app-pos">${app.position || 'Employee'}</div>
                <div>${statusBadge}</div>
            `;
            
            div.onclick = () => {
                selectedAppId = app.id; 
                document.querySelectorAll('.applicant-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                renderDetails(app);
            };
            listEl.appendChild(div);
        });
    }

    function safeVal(val) { 
        return val ? val : `<span class="missing-data">Awaiting submission</span>`; 
    }

    window.markAsProcessed = async function(appId) {
        if(!confirm("Are you sure you want to mark this onboarding file as processed? This indicates HR has extracted all required data.")) return;
        
        try {
            await updateDoc(doc(db, "NGUO New Applicants", appId), {
                onboardingProcessed: true,
                onboardingProcessedAt: new Date().toISOString(),
                onboardingProcessedBy: localStorage.getItem('ngu_portal_username') || 'Admin'
            });
            alert("Onboarding file marked as processed.");
        } catch (error) {
            console.error(error);
            alert("Failed to update status. Check permissions.");
        }
    };

    // ---------- HMRC Starter Checklist generator ----------
    function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function fmtDateDMY(val) {
        if (!val) return '';
        const d = new Date(val);
        if (isNaN(d.getTime())) return escapeHtml(val);
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function box(label, checked) {
        return `<span style="display:inline-flex;align-items:center;gap:6px;margin-right:18px;">
            <span style="display:inline-block;width:14px;height:14px;border:1.5px solid #000;text-align:center;line-height:13px;font-size:11px;font-weight:bold;">${checked ? 'X' : ''}</span>
            ${label}
        </span>`;
    }

    window.generateHmrcChecklist = function(appId) {
        const app = applicationsData.find(a => a.id === appId);
        if (!app) return;

        const pNew = app.onboardingDetails || {};
        const hmrc = app.hmrcChecklist || {};

        const firstName = pNew.firstName || (app.fullName || '').split(' ')[0] || '';
        const lastName = pNew.lastName || (app.fullName || '').split(' ').slice(1).join(' ') || '';
        const dob = fmtDateDMY(pNew.dob);
        const ni = pNew.niNumber || '';
        const address = pNew.address || '';
        const postcode = pNew.postcode || '';
        const gender = pNew.gender || '';

        const statement = hmrc.calculatedStatementOutcome || ''; // expected "A", "B" or "C"
        const stmtA = /A/i.test(statement);
        const stmtB = /B/i.test(statement);
        const stmtC = /C/i.test(statement);

        const hasLoan = (hmrc.hasLoanQuestion || '').toLowerCase();
        const loanYes = hasLoan === 'yes';
        const loanNo = hasLoan === 'no';
        const planType = hmrc.selectedPlan || '';
        const plan1 = /plan ?1/i.test(planType);
        const plan2 = /plan ?2/i.test(planType);
        const plan4 = /plan ?4/i.test(planType);
        const postgrad = !!hmrc.postgradLoanSelected;

        const signName = app.contractSignName || `${firstName} ${lastName}`.trim();
        const signDate = app.contractAcceptedAt ? fmtDateDMY(app.contractAcceptedAt) : '';

        const innerHtml = `
    <style>
        #hmrcOverlay .hmrc-doc { font-family: Arial, Helvetica, sans-serif; color:#000; line-height:1.45; font-size: 13.5px; }
        #hmrcOverlay h1 { font-size: 20px; margin-bottom: 4px; }
        #hmrcOverlay h2 { font-size: 15px; margin: 22px 0 8px; border-bottom: 2px solid #000; padding-bottom: 4px; }
        #hmrcOverlay .sub { color:#444; font-size:12.5px; margin-bottom: 18px; }
        #hmrcOverlay .field-row { display:flex; gap: 24px; margin-bottom: 10px; flex-wrap: wrap; }
        #hmrcOverlay .field { flex: 1; min-width: 200px; }
        #hmrcOverlay .field-label { font-size: 11px; color:#555; text-transform:uppercase; letter-spacing:0.03em; margin-bottom:2px; }
        #hmrcOverlay .field-value { border-bottom: 1px solid #999; padding: 4px 2px; min-height: 20px; font-weight:600; }
        #hmrcOverlay .stmt-block { border: 1px solid #999; padding: 12px 14px; margin-bottom: 10px; border-radius: 4px; }
        #hmrcOverlay .stmt-block.checked { background: #eef7fc; border-color: #00A3E0; }
        #hmrcOverlay .stmt-letter { font-weight:bold; margin-right:6px; }
        #hmrcOverlay .note { font-size: 11.5px; color:#555; margin-top: 4px;}
        #hmrcOverlay .signature-box { border:1px solid #999; padding: 14px; margin-top: 10px; }
        #hmrcOverlay .gov-link { font-size: 11.5px; color:#005EB8; margin-top:30px; }
        @media print {
            body * { visibility: hidden; }
            #hmrcOverlay, #hmrcOverlay * { visibility: visible; }
            #hmrcOverlay { position: absolute; inset:0; background:#fff !important; padding:0 !important; }
            #hmrcOverlay .hmrc-toolbar { display:none !important; }
        }
    </style>
    <div class="hmrc-doc">
        <h1>Starter checklist</h1>
        <div class="sub">For PAYE. Pre-filled from NGU onboarding records for HR reference — verify with the employee and transcribe onto the official HMRC form at <strong>www.gov.uk/government/publications/paye-starter-checklist</strong> before payroll submission.</div>

        <h2>1. Employee's personal details</h2>
        <div class="field-row">
            <div class="field"><div class="field-label">Last name</div><div class="field-value">${escapeHtml(lastName) || '&nbsp;'}</div></div>
            <div class="field"><div class="field-label">First name(s)</div><div class="field-value">${escapeHtml(firstName) || '&nbsp;'}</div></div>
        </div>
        <div class="field-row">
            <div class="field"><div class="field-label">Date of birth</div><div class="field-value">${dob || '&nbsp;'}</div></div>
            <div class="field"><div class="field-label">Gender</div><div class="field-value">${escapeHtml(gender) || '&nbsp;'}</div></div>
            <div class="field"><div class="field-label">National Insurance number</div><div class="field-value">${escapeHtml(ni) || '&nbsp;'}</div></div>
        </div>
        <div class="field-row">
            <div class="field" style="flex:2"><div class="field-label">Home address</div><div class="field-value">${escapeHtml(address) || '&nbsp;'}</div></div>
            <div class="field"><div class="field-label">Postcode</div><div class="field-value">${escapeHtml(postcode) || '&nbsp;'}</div></div>
        </div>

        <h2>2. Employee statement</h2>
        <div class="note">Only one statement should apply. Tick the box that matches the employee's circumstances.</div>

        <div class="stmt-block ${stmtA ? 'checked' : ''}">
            ${box('', stmtA)} <span class="stmt-letter">A —</span> This is my first job since 6 April and I have not been receiving taxable Jobseeker's Allowance, Employment and Support Allowance, taxable Incapacity Benefit, State Pension or Occupational Pension.
        </div>
        <div class="stmt-block ${stmtB ? 'checked' : ''}">
            ${box('', stmtB)} <span class="stmt-letter">B —</span> Since 6 April I have had another job but I do not have a P45, and/or I have received taxable Jobseeker's Allowance, Employment and Support Allowance or taxable Incapacity Benefit. I do not receive a State or Occupational Pension.
        </div>
        <div class="stmt-block ${stmtC ? 'checked' : ''}">
            ${box('', stmtC)} <span class="stmt-letter">C —</span> As well as my new job, I have another job or receive a State or Occupational Pension.
        </div>

        <h2>3. Student loans</h2>
        <div class="field-row">
            <div class="field">${box('Yes, currently repaying', loanYes)}${box('No', loanNo)}</div>
        </div>
        <div class="field-row">
            <div class="field">${box('Plan 1', plan1)}${box('Plan 2', plan2)}${box('Plan 4', plan4)}</div>
            <div class="field">${box('Postgraduate loan', postgrad)}</div>
        </div>

        <h2>Declaration</h2>
        <div class="signature-box">
            <div class="field-row">
                <div class="field"><div class="field-label">Full name</div><div class="field-value">${escapeHtml(signName) || '&nbsp;'}</div></div>
                <div class="field"><div class="field-label">Date</div><div class="field-value">${signDate || '&nbsp;'}</div></div>
            </div>
            ${app.contractSignature ? `<div style="margin-top:10px;"><div class="field-label">Signature on file</div><img src="${app.contractSignature}" style="max-height:60px;border:1px solid #ccc;padding:4px;margin-top:4px;"></div>` : `<div class="note" style="margin-top:8px;">No digital signature image on file — employee should sign the official form directly.</div>`}
        </div>

        <div class="gov-link">Do not send this form to HMRC. Give the completed official version to the employer for payroll. Get the official blank HMRC Starter Checklist at: https://www.gov.uk/government/publications/paye-starter-checklist</div>
    </div>`;

        const existing = document.getElementById('hmrcOverlay');
        if (existing) existing.remove();

        const overlay = document.createElement('div');
        overlay.id = 'hmrcOverlay';
        overlay.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:9999; display:flex; align-items:center; justify-content:center; padding:30px;';
        overlay.innerHTML = `
            <div style="background:#fff; color:#000; max-width:860px; width:100%; max-height:92vh; overflow-y:auto; border-radius:8px;">
                <div class="hmrc-toolbar" style="position:sticky; top:0; background:#fff; padding:14px 24px; border-bottom:1px solid #ddd; display:flex; justify-content:flex-end; gap:10px; z-index:10;">
                    <button id="hmrcPrintBtn" style="background:#005EB8; color:#fff; border:none; padding:8px 16px; border-radius:5px; font-size:13px; cursor:pointer; font-weight:600;">🖨 Print / Save as PDF</button>
                    <button id="hmrcCloseBtn" style="background:#666; color:#fff; border:none; padding:8px 16px; border-radius:5px; font-size:13px; cursor:pointer; font-weight:600;">✕ Close</button>
                </div>
                <div style="padding: 30px 40px 60px;">${innerHtml}</div>
            </div>`;

        document.body.appendChild(overlay);
        overlay.querySelector('#hmrcPrintBtn').addEventListener('click', () => window.print());
        overlay.querySelector('#hmrcCloseBtn').addEventListener('click', () => overlay.remove());
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    };

    function renderDetails(app) {
        const mainEl = document.getElementById('mainContent');
        
        // Map to exact variables populated by complete-onboarding.html
        const pOriginal = app.personalDetails || {};
        const pNew = app.onboardingDetails || {};
        const bk = app.bankDetails || {};
        const ec = app.emergencyContact || {};
        const uni = app.uniformData || {};
        const hmrc = app.hmrcChecklist || {};
        const docs = app.onboardingDocs || {};
        
        const computedFullName = app.fullName || `${pNew.firstName || pOriginal.forename || ''} ${pNew.lastName || pOriginal.surname || ''}`.trim() || 'Applicant';
        const formatStart = app.startDate ? new Date(app.startDate).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }) : 'TBC';
        const contractDate = app.contractAcceptedAt ? new Date(app.contractAcceptedAt).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short'}) : 'Unknown';

        let warningBanner = '';
        if (!app.onboardingCompleted) {
            warningBanner = `<div class="banner-warning">⚠️ The applicant has accepted their contract but has NOT submitted their final onboarding data form yet. Pending fields will populate once they complete the workflow.</div>`;
        }

        let actionHtml = '';
        if (app.onboardingCompleted && !app.onboardingProcessed) {
            actionHtml = `<div style="text-align: right; margin-top: 1rem;"><button class="btn-action" onclick="markAsProcessed('${app.id}')">Mark File as HR Processed</button></div>`;
        } else if (app.onboardingProcessed) {
            actionHtml = `<div style="text-align: right; margin-top: 1rem; color: var(--accent); font-weight: 600;">✓ Processed by ${app.onboardingProcessedBy || 'Admin'}</div>`;
        }

        // Generate Documents HTML
        let docsHtml = '';
        if (Object.keys(docs).length > 0) {
            const docLabels = {
                passport: 'Passport / ID', idphoto: 'ID Headshot', dlfront: 'Driving Licence (Front)', dlback: 'Driving Licence (Back)', poa: 'Proof of Address', p45: 'P45 Document'
            };
            Object.keys(docs).forEach(key => {
                const f = docs[key];
                const title = docLabels[key] || key.toUpperCase();
                docsHtml += `<div class="doc-item">
                                <div><strong>${title}</strong><br><small style="color:var(--text-muted);">${f.filename}</small></div>
                                <a href="${f.url}" target="_blank" class="btn-download">View Document</a>
                             </div>`;
            });
        } else {
            docsHtml = `<div class="missing-data">No documents uploaded yet.</div>`;
        }

        // Generate Holidays HTML
        let holidaysHtml = '';
        if (pNew.holidays && pNew.holidays.length > 0) {
            pNew.holidays.forEach(h => {
                holidaysHtml += `<span class="holiday-chip">${h.from} to ${h.to}</span>`;
            });
        } else {
            holidaysHtml = `<span style="color:var(--text-muted); font-size:0.9rem;">None declared</span>`;
        }

        // Generate HMRC Statement / Plan Text
        let taxBlock = `<div class="missing-data">Checklist pending</div>`;
        if (app.hasP45 === true) {
            taxBlock = `<div style="color:var(--success); font-weight:bold;">Applicant provided a P45. (See Documents)</div>`;
        } else if (app.hasP45 === false && hmrc.calculatedStatementOutcome) {
            taxBlock = `<div style="background:rgba(0,0,0,0.2); padding:1rem; border-radius:6px; border:1px solid var(--border);">
                            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:0.5rem;">
                                <div style="color:var(--accent); font-weight:bold;">${hmrc.calculatedStatementOutcome} Selected</div>
                                <button type="button" class="btn-hmrc" data-hmrc-app-id="${app.id}">📋 Generate HMRC Starter Checklist</button>
                            </div>
                            <div style="font-size:0.85rem; color:var(--text-light); margin-bottom:10px;">
                                Another Job: <strong>${hmrc.anotherJobQuestion || '-'}</strong> | 
                                Pension: <strong>${hmrc.pensionQuestion || '-'}</strong> | 
                                Benefits: <strong>${hmrc.benefitsQuestion || '-'}</strong>
                            </div>
                            <div style="border-top:1px solid var(--border); padding-top:0.5rem; font-size:0.85rem; color:var(--text-light);">
                                Student Loan: <strong>${hmrc.hasLoanQuestion || '-'}</strong><br>
                                Plan Type: <strong style="color:var(--success);">${hmrc.selectedPlan || 'None'}</strong> | Postgrad: <strong>${hmrc.postgradLoanSelected ? 'Yes' : 'No'}</strong>
                            </div>
                        </div>`;
        }

        mainEl.innerHTML = `
            ${warningBanner}
            
            <div class="app-header">
                <div>
                    <h1>${computedFullName}</h1>
                    <div class="role-badge">${app.position || 'Role TBC'}</div>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase;">Start Date</div>
                    <div style="font-size: 1.2rem; color: white; font-weight: 700;">${formatStart}</div>
                </div>
            </div>

            <div class="section">
                <h3>📄 Uploaded Identification & Documents</h3>
                ${docsHtml}
            </div>

            <div class="section" style="border-color: ${app.onboardingCompleted ? 'var(--border)' : 'var(--warning)'}">
                <h3>👤 Core Employee Details</h3>
                <div class="grid-3">
                    <div class="data-group"><div class="data-label">Legal Name</div><div class="data-value">${safeVal(pNew.firstName)} ${safeVal(pNew.lastName)}</div></div>
                    <div class="data-group"><div class="data-label">Preferred Name</div><div class="data-value">${safeVal(pNew.preferredName)}</div></div>
                    <div class="data-group"><div class="data-label">Date of Birth</div><div class="data-value">${safeVal(pNew.dob)}</div></div>
                    <div class="data-group"><div class="data-label">National Insurance</div><div class="data-value mono">${safeVal(pNew.niNumber)}</div></div>
                    <div class="data-group"><div class="data-label">Personal Email</div><div class="data-value">${safeVal(pNew.personalEmail)}</div></div>
                    <div class="data-group"><div class="data-label">Phone</div><div class="data-value">${safeVal(pNew.phone)}</div></div>
                    <div class="data-group" style="grid-column: 1 / span 2;"><div class="data-label">Home Address</div><div class="data-value">${safeVal(pNew.address)}, ${safeVal(pNew.postcode)}</div></div>
                    <div class="data-group"><div class="data-label">Time at Address</div><div class="data-value">${safeVal(pNew.timeAtAddress)}</div></div>
                    <div class="data-group" style="grid-column: 1 / -1;"><div class="data-label">Previous Address History</div><div class="data-value" style="white-space:pre-wrap;">${safeVal(pNew.addressHistory)}</div></div>
                </div>
                
                <div style="border-top:1px solid var(--border); margin-top:1.5rem; padding-top:1.5rem;">
                    <div class="data-label" style="color:var(--accent);">Pre-Booked Holidays</div>
                    <div style="margin-top:0.5rem;">${holidaysHtml}</div>
                </div>
            </div>

            <div class="section" style="border-color: ${app.onboardingCompleted ? 'var(--border)' : 'var(--warning)'}">
                <h3>💳 Payroll, Bank & HMRC</h3>
                <div class="grid-3" style="margin-bottom: 1.5rem;">
                    <div class="data-group"><div class="data-label">Name on Account</div><div class="data-value">${safeVal(bk.accountName)}</div></div>
                    <div class="data-group"><div class="data-label">Sort Code</div><div class="data-value mono">${safeVal(bk.sortCode)}</div></div>
                    <div class="data-group"><div class="data-label">Account Number</div><div class="data-value mono">${safeVal(bk.accountNumber)}</div></div>
                    <div class="data-group"><div class="data-label">Bank Name</div><div class="data-value">${safeVal(bk.bankName)}</div></div>
                </div>
                
                <div style="border-top:1px dashed var(--border); padding-top:1.5rem;">
                    <div class="data-label" style="color:var(--accent); margin-bottom:1rem;">HMRC Starter Profile</div>
                    ${taxBlock}
                </div>
            </div>

            <div class="section" style="border-color: ${app.onboardingCompleted ? 'var(--border)' : 'var(--warning)'}">
                <h3>🚨 Emergency Contact (Next of Kin)</h3>
                <div class="grid-3">
                    <div class="data-group"><div class="data-label">Full Name</div><div class="data-value">${safeVal(ec.name)}</div></div>
                    <div class="data-group"><div class="data-label">Relationship</div><div class="data-value">${safeVal(ec.relationship)}</div></div>
                    <div class="data-group"><div class="data-label">Primary Number</div><div class="data-value">${safeVal(ec.phone)}</div></div>
                    <div class="data-group"><div class="data-label">Alt Number</div><div class="data-value">${safeVal(ec.altPhone)}</div></div>
                </div>
            </div>

            <div class="section" style="border-color: ${app.onboardingCompleted ? 'var(--border)' : 'var(--warning)'}">
                <h3>👕 Uniform & Background Checks</h3>
                <div class="grid-3" style="margin-bottom: 1.5rem;">
                    <div class="data-group"><div class="data-label">T-Shirt</div><div class="data-value">${safeVal(uni.tshirt)}</div></div>
                    <div class="data-group"><div class="data-label">Hoodie</div><div class="data-value">${safeVal(uni.hoodie)}</div></div>
                    <div class="data-group"><div class="data-label">FR Jacket</div><div class="data-value">${safeVal(uni.frJacket)}</div></div>
                    <div class="data-group"><div class="data-label">Regatta Jacket</div><div class="data-value">${safeVal(uni.regattaJacket)}</div></div>
                    <div class="data-group"><div class="data-label">Trousers</div><div class="data-value">W: ${safeVal(uni.trouserWaist)} | L: ${safeVal(uni.trouserLength)}</div></div>
                    <div class="data-group"><div class="data-label">Boots / Gloves</div><div class="data-value">B: ${safeVal(uni.boots)} | G: ${safeVal(uni.gloves)}</div></div>
                </div>
                
                <div style="border-top:1px dashed var(--border); padding-top:1.5rem;">
                    <div class="data-group">
                        <div class="data-label" style="color:var(--accent);">DBS Background Check Preference</div>
                        <div class="data-value" style="margin-top:0.5rem; font-weight:bold;">
                            ${app.dbsInfo?.choice === 'yes' ? '<span style="color:var(--success);">Yes, process on my behalf</span> (Consent Given)' : (app.dbsInfo?.choice === 'no' ? '<span style="color:var(--warning);">No, I will provide a recent valid certificate</span>' : '<span class="missing-data">Pending</span>')}
                        </div>
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>✍️ Contract Acceptance Record</h3>
                <div class="grid-2">
                    <div class="data-group"><div class="data-label">Date Accepted</div><div class="data-value">${contractDate}</div></div>
                    <div class="data-group"><div class="data-label">Print Name</div><div class="data-value">${app.contractSignName || 'N/A'}</div></div>
                    <div class="data-group" style="grid-column: 1 / -1;">
                        <div class="data-label">Digital Signature Mark</div>
                        ${app.contractSignature ? `<img src="${app.contractSignature}" class="signature-img">` : '<div class="missing-data">No digital signature image found</div>'}
                    </div>
                </div>
            </div>

            ${actionHtml}
        `;

        const hmrcBtn = mainEl.querySelector('[data-hmrc-app-id]');
        if (hmrcBtn) {
            hmrcBtn.addEventListener('click', function() {
                generateHmrcChecklist(this.getAttribute('data-hmrc-app-id'));
            });
        }
    }
</script>
</body>
</html>
