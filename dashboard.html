<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGU — Operations Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #060d1a;
            --surface: #0d1b2e;
            --surface-2: #132338;
            --border: #1e3050;
            --border-glow: rgba(0, 163, 224, 0.25);
            --text: #e4ecf4;
            --muted: #526882;
            --accent: #00A3E0;
            --accent-dim: rgba(0, 163, 224, 0.12);
            --green: #10B981;
            --green-dim: rgba(16, 185, 129, 0.12);
            --amber: #F59E0B;
            --amber-dim: rgba(245, 158, 11, 0.12);
            --red: #EF4444;
            --header-h: 62px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        /* Background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,163,224,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,163,224,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── HEADER ── */
        .header {
            position: relative;
            z-index: 10;
            flex-shrink: 0;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        .header-left { display: flex; align-items: center; gap: 18px; }
        .logo { height: 34px; }

        .header-title {
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text);
        }

        .header-right { display: flex; align-items: center; gap: 12px; }

        .live-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            background: var(--green-dim);
            border: 1px solid rgba(16,185,129,0.3);
            padding: 5px 12px;
            border-radius: 20px;
        }
        .live-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.25;} }
        .live-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: 'DM Mono', monospace;
        }

        .last-updated-header {
            font-size: 0.68rem;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
        }

        .btn-hub {
            padding: 7px 14px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: border-color 0.2s, background 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-hub:hover { border-color: var(--accent); background: var(--accent-dim); }

        /* ── MAIN BODY ── */
        .dash-body {
            position: relative;
            z-index: 1;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 16px 20px;
            gap: 16px;
            overflow: hidden;
        }

        /* ── STAT CARDS ── */
        .stat-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            flex-shrink: 0;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 22px 16px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 18px;
            transition: border-color 0.2s;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
        }
        .stat-card.accent { border-color: rgba(0,163,224,0.2); }
        .stat-card.accent::after { background: var(--accent); }
        .stat-card.amber { border-color: rgba(245,158,11,0.2); }
        .stat-card.amber::after { background: var(--amber); }
        .stat-card.green { border-color: rgba(16,185,129,0.2); }
        .stat-card.green::after { background: var(--green); }

        .stat-icon-wrap {
            width: 46px; height: 46px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .stat-card.accent .stat-icon-wrap { background: var(--accent-dim); border: 1px solid rgba(0,163,224,0.2); }
        .stat-card.amber .stat-icon-wrap { background: var(--amber-dim); border: 1px solid rgba(245,158,11,0.2); }
        .stat-card.green .stat-icon-wrap { background: var(--green-dim); border: 1px solid rgba(16,185,129,0.2); }

        .stat-icon-wrap svg { width: 22px; height: 22px; }
        .stat-card.accent .stat-icon-wrap svg { color: var(--accent); }
        .stat-card.amber .stat-icon-wrap svg { color: var(--amber); }
        .stat-card.green .stat-icon-wrap svg { color: var(--green); }

        .stat-info { min-width: 0; }
        .stat-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 2.4rem;
            font-weight: 800;
            line-height: 1;
            font-family: 'DM Mono', monospace;
        }
        .stat-card.accent .stat-value { color: var(--accent); }
        .stat-card.amber .stat-value { color: var(--amber); }
        .stat-card.green .stat-value { color: var(--green); }
        .stat-sub {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 3px;
        }

        /* ── PANELS ROW ── */
        .panels-row {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: 1fr 1fr 2fr;
            gap: 14px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .panel-head {
            flex-shrink: 0;
            padding: 13px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.18);
        }

        .panel-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-title svg { width: 14px; height: 14px; color: var(--accent); flex-shrink: 0; }

        .panel-count {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            background: var(--accent-dim);
            border: 1px solid rgba(0,163,224,0.2);
            padding: 2px 9px;
            border-radius: 20px;
        }

        .panel-body {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 12px;
        }

        .panel-body::-webkit-scrollbar { width: 3px; }
        .panel-body::-webkit-scrollbar-track { background: transparent; }
        .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── ROWS ── */
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(6px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .row-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 7px;
            margin-bottom: 6px;
            animation: fadeUp 0.25s ease forwards;
            transition: border-color 0.2s;
        }
        .row-item:last-child { margin-bottom: 0; }
        .row-item:hover { border-color: rgba(0,163,224,0.28); }

        .row-main { min-width: 0; flex: 1; }
        .row-name {
            font-size: 0.84rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .row-meta {
            font-size: 0.68rem;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .row-meta b { color: var(--accent); font-weight: 500; }

        /* Applications grid panel */
        .app-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .app-grid .row-item { margin-bottom: 0; }

        .pill {
            font-size: 0.62rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .pill-pending { background: var(--amber-dim); border: 1px solid rgba(245,158,11,0.3); color: var(--amber); }
        .pill-accepted { background: var(--green-dim); border: 1px solid rgba(16,185,129,0.3); color: var(--green); }
        .pill-denied { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
        .pill-live { background: var(--green-dim); border: 1px solid rgba(16,185,129,0.3); color: var(--green); font-size: 0.6rem; }

        .empty-msg {
            text-align: center;
            padding: 30px 16px;
            color: var(--muted);
            font-size: 0.8rem;
        }

        .skeleton {
            background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
            display: block;
            height: 12px;
            margin-bottom: 4px;
        }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="header-left">
        <a href="homepage.html" class="btn-hub">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Hub
        </a>
        <img src="https://www.dropbox.com/scl/fi/kkujm1u6y7vvnp7luq8d7/ngu-main-white.png?rlkey=kgq2uh48qh4xssh4vlbz868lr&raw=1" alt="NGU Logo" class="logo">
        <div class="header-title">Operations Dashboard</div>

        </div>

</header>

<!-- MAIN -->
<div class="dash-body">

    <!-- STAT CARDS -->
    <div class="stat-row">

        <div class="stat-card accent">
            <div class="stat-icon-wrap">
                <!-- briefcase -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="12"/><path d="M2 12h20"/></svg>
            </div>
            <div class="stat-info">
                <div class="stat-label">Live Vacancies</div>
                <div class="stat-value" id="stat-vacancies">—</div>
                <div class="stat-sub">Fully approved & open</div>
            </div>
        </div>

        <div class="stat-card amber">
            <div class="stat-icon-wrap">
                <!-- share/referral -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            </div>
            <div class="stat-info">
                <div class="stat-label">Referral Submissions</div>
                <div class="stat-value" id="stat-referrals">—</div>
                <div class="stat-sub">All-time received</div>
            </div>
        </div>

        <div class="stat-card green">
            <div class="stat-icon-wrap">
                <!-- users -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <div class="stat-info">
                <div class="stat-label">Applications Received</div>
                <div class="stat-value" id="stat-applications">—</div>
                <div class="stat-sub">Total on record</div>
            </div>
        </div>

    </div>

    <!-- PANELS ROW -->
    <div class="panels-row">

        <!-- VACANCIES -->
        <div class="panel">
            <div class="panel-head">
                <div class="panel-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>

                </div>
                <div class="panel-count" id="vac-count-badge">—</div>
            </div>
            <div class="panel-body" id="vacancies-list">
                <div class="row-item"><div class="row-main"><span class="skeleton" style="width:70%"></span><span class="skeleton" style="width:45%"></span></div></div>
                <div class="row-item"><div class="row-main"><span class="skeleton" style="width:80%"></span><span class="skeleton" style="width:55%"></span></div></div>
                <div class="row-item"><div class="row-main"><span class="skeleton" style="width:60%"></span><span class="skeleton" style="width:40%"></span></div></div>
            </div>
        </div>

        <!-- REFERRALS -->
        <div class="panel">
            <div class="panel-head">
                <div class="panel-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                    Referral Submissions
                </div>
                <div class="panel-count" id="ref-count-badge">—</div>
            </div>
            <div class="panel-body" id="referrals-list">
                <div class="row-item"><div class="row-main"><span class="skeleton" style="width:65%"></span><span class="skeleton" style="width:50%"></span></div></div>
                <div class="row-item"><div class="row-main"><span class="skeleton" style="width:75%"></span><span class="skeleton" style="width:45%"></span></div></div>
                <div class="row-item"><div class="row-main"><span class="skeleton" style="width:55%"></span><span class="skeleton" style="width:60%"></span></div></div>
            </div>
        </div>

        <!-- APPLICATIONS -->
        <div class="panel">
            <div class="panel-head">
                <div class="panel-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Applications
                </div>
                <div class="panel-count" id="app-count-badge">—</div>
            </div>
            <div class="panel-body" id="applications-list">
                <div class="app-grid">
                    <div class="row-item"><div class="row-main"><span class="skeleton" style="width:70%"></span><span class="skeleton" style="width:50%"></span></div></div>
                    <div class="row-item"><div class="row-main"><span class="skeleton" style="width:65%"></span><span class="skeleton" style="width:55%"></span></div></div>
                    <div class="row-item"><div class="row-main"><span class="skeleton" style="width:80%"></span><span class="skeleton" style="width:45%"></span></div></div>
                    <div class="row-item"><div class="row-main"><span class="skeleton" style="width:60%"></span><span class="skeleton" style="width:60%"></span></div></div>
                </div>
            </div>
        </div>

    </div>

</div>

<!-- Firebase -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore, collection, query, where, orderBy, onSnapshot }
        from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
        authDomain: "oesperformance-a54c0.firebaseapp.com",
        projectId: "oesperformance-a54c0",
        storageBucket: "oesperformance-a54c0.firebasestorage.app",
        messagingSenderId: "484894102454",
        appId: "1:484894102454:web:17535ee497eac2d90d6717"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const safe = (v, fallback = 'Unknown') => v || fallback;

    function formatDate(timestamp) {
        if (!timestamp) return '—';
        const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function animateCount(el, target) {
        let current = 0;
        const step = Math.max(1, Math.ceil(target / 24));
        const iv = setInterval(() => {
            current = Math.min(current + step, target);
            el.textContent = current;
            if (current >= target) clearInterval(iv);
        }, 35);
    }

    function updateTimestamp() {
        document.getElementById('last-updated').textContent =
            'Updated ' + new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // ── 1. LIVE VACANCIES ─────────────────────────────────────
    const vacQuery = query(collection(db, 'NGU Recuitment Approval Form'), where('workflowClosed', '==', false));

    onSnapshot(vacQuery, (snapshot) => {
        const live = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            const a = data.approvalSignOff || {};
            if (a.departmentHead?.decision === 'Approve' && a.finance?.decision === 'Approve' && a.finalApprover?.decision === 'Approve') {
                live.push({ id: doc.id, ...data });
            }
        });

        animateCount(document.getElementById('stat-vacancies'), live.length);
        document.getElementById('vac-count-badge').textContent = `${live.length} open`;

        const listEl = document.getElementById('vacancies-list');
        listEl.innerHTML = '';

        if (!live.length) { listEl.innerHTML = '<div class="empty-msg">No live vacancies.</div>'; return; }

        live.forEach((v, i) => {
            const title = safe(v.requestInformation?.jobTitle, 'Untitled Role');
            const location = safe(v.requestInformation?.location, 'TBC');
            const dept = v.requestInformation?.department || '';
            const dateApproved = v.finalOutcome?.dateApproved || v.approvalSignOff?.finalApprover?.date;

            const row = document.createElement('div');
            row.className = 'row-item';
            row.style.animationDelay = `${i * 0.05}s`;
            row.innerHTML = `
                <div class="row-main">
                    <div class="row-name">${title}</div>
                    <div class="row-meta"><b>${location}</b>${dept ? ' · ' + dept : ''}${dateApproved ? ' · ' + formatDate(dateApproved) : ''}</div>
                </div>
                <span class="pill pill-live">Live</span>
            `;
            listEl.appendChild(row);
        });
        updateTimestamp();
    });

    // ── 2. REFERRALS ──────────────────────────────────────────
    const refQuery = query(collection(db, 'NGU Referral submissions'), orderBy('submittedAt', 'desc'));

    onSnapshot(refQuery, (snapshot) => {
        const refs = [];
        snapshot.forEach(doc => refs.push({ id: doc.id, ...doc.data() }));

        animateCount(document.getElementById('stat-referrals'), refs.length);
        document.getElementById('ref-count-badge').textContent = `${refs.length} total`;

        const listEl = document.getElementById('referrals-list');
        listEl.innerHTML = '';

        if (!refs.length) { listEl.innerHTML = '<div class="empty-msg">No referrals yet.</div>'; return; }

        refs.slice(0, 30).forEach((ref, i) => {
            const status = ref.status || 'Pending';
            const pillClass = status === 'Accepted' ? 'pill-accepted' : status === 'Denied' ? 'pill-denied' : 'pill-pending';
            const row = document.createElement('div');
            row.className = 'row-item';
            row.style.animationDelay = `${i * 0.04}s`;
            row.innerHTML = `
                <div class="row-main">
                    <div class="row-name">${safe(ref.referralName, 'Unnamed')}</div>
                    <div class="row-meta">via <b>${safe(ref.referrerName)}</b> · ${safe(ref.role, 'No role')}${ref.referralPostcode ? ' · ' + ref.referralPostcode : ''}</div>
                </div>
                <span class="pill ${pillClass}">${status}</span>
            `;
            listEl.appendChild(row);
        });
        updateTimestamp();
    });

    // ── 3. APPLICATIONS ───────────────────────────────────────
    const appQuery = query(collection(db, 'NGUO New Applicants'), orderBy('submittedAt', 'desc'));

    onSnapshot(appQuery, (snapshot) => {
        const apps = [];
        snapshot.forEach(doc => apps.push({ id: doc.id, ...doc.data() }));

        animateCount(document.getElementById('stat-applications'), apps.length);
        document.getElementById('app-count-badge').textContent = `${apps.length} total`;

        const listEl = document.getElementById('applications-list');
        listEl.innerHTML = '';

        if (!apps.length) { listEl.innerHTML = '<div class="empty-msg">No applications.</div>'; return; }

        const grid = document.createElement('div');
        grid.className = 'app-grid';

        apps.slice(0, 60).forEach((a, i) => {
            const fd = a.finalRecruitmentDecision;
            let label = 'Active', pillClass = 'pill-pending';
            if (fd === 'Approved') { label = 'Offered'; pillClass = 'pill-accepted'; }
            else if (fd === 'Rejected') { label = 'Rejected'; pillClass = 'pill-denied'; }
            else if (a.interviewDecision === 'Interview Rejected') { label = 'Int. Rej.'; pillClass = 'pill-denied'; }
            else if (a.status === 'Ready for Interview') { label = 'Interview'; pillClass = 'pill-accepted'; }
            else if ((a.reviews || []).length >= 2) { label = 'Reviewed'; pillClass = 'pill-accepted'; }

            const row = document.createElement('div');
            row.className = 'row-item';
            row.style.animationDelay = `${i * 0.02}s`;
            row.innerHTML = `
                <div class="row-main">
                    <div class="row-name">${safe(a.fullName, 'Unnamed')}</div>
                    <div class="row-meta"><b>${safe(a.position, 'No role')}</b>${a.personalDetails?.postcode ? ' · ' + a.personalDetails.postcode : ''} · ${formatDate(a.submittedAt)}</div>
                </div>
                <span class="pill ${pillClass}">${label}</span>
            `;
            grid.appendChild(row);
        });

        listEl.appendChild(grid);
        updateTimestamp();
    });
</script>

</body>
</html>
