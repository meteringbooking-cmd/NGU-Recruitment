<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGU — Operations Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #060d1a;
            --surface: #0d1b2e;
            --surface-2: #132338;
            --border: #1e3050;
            --border-glow: rgba(0, 163, 224, 0.25);
            --text: #e4ecf4;
            --muted: #526882;
            --accent: #00A3E0;
            --accent-dim: rgba(0, 163, 224, 0.12);
            --green: #10B981;
            --green-dim: rgba(16, 185, 129, 0.12);
            --amber: #F59E0B;
            --amber-dim: rgba(245, 158, 11, 0.12);
            --red: #EF4444;
            --purple: #8B5CF6;
            --purple-dim: rgba(139, 92, 246, 0.12);
            --header-h: 62px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,163,224,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,163,224,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── HEADER ── */
        .header {
            position: relative;
            z-index: 10;
            flex-shrink: 0;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        .header-left { display: flex; align-items: center; gap: 18px; }
        .logo { height: 34px; }

        .header-title {
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text);
        }

        .header-right { display: flex; align-items: center; gap: 12px; }

        .live-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            background: var(--green-dim);
            border: 1px solid rgba(16,185,129,0.3);
            padding: 5px 12px;
            border-radius: 20px;
        }
        .live-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.25;} }
        .live-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: 'DM Mono', monospace;
        }

        .last-updated-header {
            font-size: 0.68rem;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
        }

        .btn-hub {
            padding: 7px 14px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: border-color 0.2s, background 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-hub:hover { border-color: var(--accent); background: var(--accent-dim); }

        /* ── MAIN BODY ── */
        .dash-body {
            position: relative;
            z-index: 1;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 16px 20px;
            gap: 16px;
            overflow: hidden;
        }

        /* ── STAT CARDS ── */
        .stat-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            flex-shrink: 0;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px 14px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: border-color 0.2s;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
        }
        .stat-card.accent  { border-color: rgba(0,163,224,0.2); }
        .stat-card.accent::after  { background: var(--accent); }
        .stat-card.amber   { border-color: rgba(245,158,11,0.2); }
        .stat-card.amber::after   { background: var(--amber); }
        .stat-card.green   { border-color: rgba(16,185,129,0.2); }
        .stat-card.green::after   { background: var(--green); }
        .stat-card.purple  { border-color: rgba(139,92,246,0.2); }
        .stat-card.purple::after  { background: var(--purple); }

        .stat-icon-wrap {
            width: 44px; height: 44px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .stat-card.accent  .stat-icon-wrap { background: var(--accent-dim);  border: 1px solid rgba(0,163,224,0.2); }
        .stat-card.amber   .stat-icon-wrap { background: var(--amber-dim);   border: 1px solid rgba(245,158,11,0.2); }
        .stat-card.green   .stat-icon-wrap { background: var(--green-dim);   border: 1px solid rgba(16,185,129,0.2); }
        .stat-card.purple  .stat-icon-wrap { background: var(--purple-dim);  border: 1px solid rgba(139,92,246,0.2); }

        .stat-icon-wrap svg { width: 20px; height: 20px; }
        .stat-card.accent  .stat-icon-wrap svg { color: var(--accent); }
        .stat-card.amber   .stat-icon-wrap svg { color: var(--amber); }
        .stat-card.green   .stat-icon-wrap svg { color: var(--green); }
        .stat-card.purple  .stat-icon-wrap svg { color: var(--purple); }

        .stat-info { min-width: 0; }
        .stat-label {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1;
            font-family: 'DM Mono', monospace;
        }
        .stat-card.accent  .stat-value { color: var(--accent); }
        .stat-card.amber   .stat-value { color: var(--amber); }
        .stat-card.green   .stat-value { color: var(--green); }
        .stat-card.purple  .stat-value { color: var(--purple); }
        .stat-sub { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }

        /* ── PANELS ROW ── */
        .panels-row {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: 1fr 1fr 2fr;
            gap: 14px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .panel-head {
            flex-shrink: 0;
            padding: 13px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.18);
        }

        .panel-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-title svg { width: 14px; height: 14px; color: var(--accent); flex-shrink: 0; }

        .panel-count {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            background: var(--accent-dim);
            border: 1px solid rgba(0,163,224,0.2);
            padding: 2px 9px;
            border-radius: 20px;
        }

        .panel-body {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 12px;
        }

        .panel-body::-webkit-scrollbar { width: 3px; }
        .panel-body::-webkit-scrollbar-track { background: transparent; }
        .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── ROWS ── */
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(6px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .row-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 7px;
            margin-bottom: 6px;
            animation: fadeUp 0.25s ease forwards;
            transition: border-color 0.2s;
        }
        .row-item:last-child { margin-bottom: 0; }
        .row-item:hover { border-color: rgba(0,163,224,0.28); }

        .row-main { min-width: 0; flex: 1; }
        .row-name {
            font-size: 0.84rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .row-meta {
            font-size: 0.68rem;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .row-meta b { color: var(--accent); font-weight: 500; }

        /* ── APPLICATION ROWS (full width, stage badge) ── */
        .app-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 7px;
            margin-bottom: 6px;
            animation: fadeUp 0.25s ease forwards;
            transition: border-color 0.2s;
        }
        .app-row:last-child { margin-bottom: 0; }
        .app-row:hover { border-color: rgba(0,163,224,0.28); }

        .app-row-info { min-width: 0; }
        .app-row-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .app-row-meta {
            font-size: 0.67rem;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .app-row-meta b { color: var(--accent); font-weight: 500; }

        /* Stage badge — wider, more prominent */
        .stage-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.64rem;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .stage-badge .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Stage colour variants */
        .stage-new        { background: rgba(0,163,224,0.1);   border: 1px solid rgba(0,163,224,0.3);   color: var(--accent); }
        .stage-new .dot        { background: var(--accent); }
        .stage-reviewing  { background: var(--amber-dim);       border: 1px solid rgba(245,158,11,0.3);  color: var(--amber); }
        .stage-reviewing .dot  { background: var(--amber); }
        .stage-namecheck  { background: rgba(139,92,246,0.1);   border: 1px solid rgba(139,92,246,0.3);  color: var(--purple); }
        .stage-namecheck .dot  { background: var(--purple); }
        .stage-interview  { background: rgba(16,185,129,0.1);   border: 1px solid rgba(16,185,129,0.3);  color: var(--green); }
        .stage-interview .dot  { background: var(--green); }
        .stage-decision   { background: rgba(245,158,11,0.15);  border: 1px solid rgba(245,158,11,0.5);  color: var(--amber); box-shadow: 0 0 6px rgba(245,158,11,0.2); }
        .stage-decision .dot   { background: var(--amber); box-shadow: 0 0 4px var(--amber); animation: blink 1.5s infinite; }

        /* Wait time chip */
        .wait-chip {
            font-size: 0.6rem;
            font-weight: 700;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--border);
            padding: 2px 7px;
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .wait-chip.urgent { color: var(--amber); border-color: rgba(245,158,11,0.3); background: var(--amber-dim); }

        .pill {
            font-size: 0.62rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .pill-pending  { background: var(--amber-dim); border: 1px solid rgba(245,158,11,0.3);  color: var(--amber); }
        .pill-accepted { background: var(--green-dim);  border: 1px solid rgba(16,185,129,0.3); color: var(--green); }
        .pill-denied   { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
        .pill-live     { background: var(--green-dim);  border: 1px solid rgba(16,185,129,0.3); color: var(--green); font-size: 0.6rem; }

        .empty-msg {
            text-align: center;
            padding: 30px 16px;
            color: var(--muted);
            font-size: 0.8rem;
        }

        .skeleton {
            background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
            display: block;
            height: 12px;
            margin-bottom: 4px;
        }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="header-left">
        <a href="homepage.html" class="btn-hub">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Hub
        </a>
        <img src="https://www.dropbox.com/scl/fi/kkujm1u6y7vvnp7luq8d7/ngu-main-white.png?rlkey=kgq2uh48qh4xssh4vlbz868lr&raw=1" alt="NGU Logo" class="logo">
        <div class="header-title">Operations Dashboard</div>
    </div>
    <div class="header-right">
        <div class="last-updated-header" id="last-updated">—</div>
        <div class="live-pill">
            <div class="live-dot"></div>
            <div class="live-label">Live</div>
        </div>
    </div>
</header>

<!-- MAIN -->
<div class="dash-body">

    <!-- STAT CARDS -->
    <div class="stat-row">

        <div class="stat-card accent">
            <div class="stat-icon-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><path d="M2 12h20"/></svg>
            </div>
            <div class="stat-info">
                <div class="stat-label">Live Vacancies</div>
                <div class="stat-value" id="stat-vacancies">—</div>
                <div class="stat-sub">Fully approved & open</div>

        </div>

        <div class="stat-card amber">
            <div class="stat-icon-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            </div>
            <div class="stat-info">
                <div class="stat-label">Referral Submissions</div>
                <div class="stat-value" id="stat-referrals">—</div>
                <div class="stat-sub">All-time received</div>
            </div>
        </div>

        <div class="stat-card green">
            <div class="stat-icon-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <div class="stat-info">
                <div class="stat-label">Active Applicants</div>
                <div class="stat-value" id="stat-applications">—</div>
                <div class="stat-sub">In pipeline now</div>

        </div>

        <div class="stat-card purple">
            <div class="stat-icon-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 6v6l4 2"/></svg>

    </div>

    <!-- PANELS ROW -->
    <div class="panels-row">

        <!-- VACANCIES -->
        <div class="panel">
            <div class="panel-head">
                <div class="panel-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    Live Vacancies
                </div>
                <div class="panel-count" id="vac-count-badge">—</div>
            </div>
            <div class="panel-body" id="vacancies-list">
                <div class="row-item"><div class="row-main"><span class="skeleton" style="width:70%"></span><span class="skeleton" style="width:45%"></span></div></div>
                <div class="row-item"><div class="row-main"><span class="skeleton" style="width:80%"></span><span class="skeleton" style="width:55%"></span></div></div>
            </div>
        </div>

        <!-- REFERRALS -->
        <div class="panel">
            <div class="panel-head">
                <div class="panel-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                    Referral Submissions
                </div>
                <div class="panel-count" id="ref-count-badge">—</div>
            </div>
            <div class="panel-body" id="referrals-list">
                <div class="row-item"><div class="row-main"><span class="skeleton" style="width:65%"></span><span class="skeleton" style="width:50%"></span></div></div>
                <div class="row-item"><div class="row-main"><span class="skeleton" style="width:75%"></span><span class="skeleton" style="width:45%"></span></div></div>
            </div>
        </div>

        <!-- ACTIVE APPLICATIONS WITH STAGE TRACKING -->
        <div class="panel">
            <div class="panel-head">
                <div class="panel-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Active Pipeline
                </div>
                <div class="panel-count" id="app-count-badge">—</div>
            </div>
            <div class="panel-body" id="applications-list">
                <div class="app-row"><div class="app-row-info"><span class="skeleton" style="width:55%"></span><span class="skeleton" style="width:70%"></span></div></div>
                <div class="app-row"><div class="app-row-info"><span class="skeleton" style="width:65%"></span><span class="skeleton" style="width:60%"></span></div></div>
                <div class="app-row"><div class="app-row-info"><span class="skeleton" style="width:50%"></span><span class="skeleton" style="width:75%"></span></div></div>
                <div class="app-row"><div class="app-row-info"><span class="skeleton" style="width:70%"></span><span class="skeleton" style="width:55%"></span></div></div>
            </div>
        </div>

    </div>

</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore, collection, query, where, orderBy, onSnapshot }
        from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
        authDomain: "oesperformance-a54c0.firebaseapp.com",
        projectId: "oesperformance-a54c0",
        storageBucket: "oesperformance-a54c0.firebasestorage.app",
        messagingSenderId: "484894102454",
        appId: "1:484894102454:web:17535ee497eac2d90d6717"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Shared interviews cache — loaded once, used by applications renderer
    let interviewsCache = [];

    const safe = (v, fallback = 'Unknown') => v || fallback;

    function formatDate(timestamp) {
        if (!timestamp) return '—';
        const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
    }

    function waitTime(submittedAt) {
        if (!submittedAt) return { label: '—', urgent: false };
        const past = submittedAt.toDate ? submittedAt.toDate() : new Date(submittedAt);
        const diffMs = Math.max(0, Date.now() - past);
        const days = Math.floor(diffMs / 86400000);
        const hrs  = Math.floor((diffMs % 86400000) / 3600000);
        return { label: days > 0 ? `${days}d ${hrs}h` : `${hrs}h`, urgent: days >= 2 };
    }

    function animateCount(el, target) {
        let current = 0;
        const step = Math.max(1, Math.ceil(target / 24));
        const iv = setInterval(() => {
            current = Math.min(current + step, target);
            el.textContent = current;
            if (current >= target) clearInterval(iv);
        }, 35);
    }

    function updateTimestamp() {
        document.getElementById('last-updated').textContent =
            'Updated ' + new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // ── JUNK FILTER (mirrors view-applications logic) ─────────
    function isJunk(app) {
        const phone = (app.personalDetails?.phone || '').trim().replace(/\s+/g, '');
        if (!phone) return true;
        return !phone.match(/^(\+44|07|01|02)/);
    }

    // ── STAGE RESOLVER ────────────────────────────────────────
    // Returns { label, cssClass } for the applicant's current pipeline stage.
    // Priority order (most advanced first):
    //   Decision needed → Interview scheduled/complete → Name check → Reviewing → New
    function resolveStage(a, interviews) {
        const email = (a.personalDetails?.email || '').toLowerCase();
        const interview = interviews.find(i => i.applicantEmail?.toLowerCase() === email);

        // Interview completed — awaiting final recruitment decision
        if (interview?.interviewCompleted && !a.finalRecruitmentDecision) {
            const rec = interview.interviewData?.recommendation || '';
            return { label: `Decision · ${rec || 'Post-Interview'}`, cssClass: 'stage-decision' };
        }

        // Interview booked but not yet completed
        if (interview && !interview.interviewCompleted) {
            const d = new Date(interview.date).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
            return { label: `Interview · ${d} ${interview.time || ''}`.trim(), cssClass: 'stage-interview' };
        }

        // Name checks in progress
        if (a.nameChecksRequested && !a.nameChecksCompleted) {
            return { label: 'Name Check', cssClass: 'stage-namecheck' };
        }

        // Name checks done, ready for interview invite
        if (a.nameChecksCompleted) {
            return { label: 'Ready · Interview', cssClass: 'stage-interview' };
        }

        // At least one review logged
        if ((a.reviews || []).length === 1) {
            return { label: 'Reviewing · 1/2', cssClass: 'stage-reviewing' };
        }

        // Both reviews done, but name checks not yet triggered (edge case)
        if ((a.reviews || []).length >= 2) {
            return { label: 'Reviewed · 2/2', cssClass: 'stage-reviewing' };
        }

        // Brand new — no reviews yet
        return { label: 'New · Awaiting Review', cssClass: 'stage-new' };
    }

    // ── 1. LIVE VACANCIES ─────────────────────────────────────
    const vacQuery = query(collection(db, 'NGU Recuitment Approval Form'), where('workflowClosed', '==', false));

    onSnapshot(vacQuery, (snapshot) => {
        const live = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            const a = data.approvalSignOff || {};
            if (a.departmentHead?.decision === 'Approve' && a.finance?.decision === 'Approve' && a.finalApprover?.decision === 'Approve') {
                live.push({ id: doc.id, ...data });
            }
        });

        animateCount(document.getElementById('stat-vacancies'), live.length);
        document.getElementById('vac-count-badge').textContent = `${live.length} open`;

        const listEl = document.getElementById('vacancies-list');
        listEl.innerHTML = '';

        if (!live.length) { listEl.innerHTML = '<div class="empty-msg">No live vacancies.</div>'; return; }

        live.forEach((v, i) => {
            const title    = safe(v.requestInformation?.jobTitle, 'Untitled Role');
            const location = safe(v.requestInformation?.location, 'TBC');
            const dept     = v.requestInformation?.department || '';
            const dateApp  = v.approvalSignOff?.finalApprover?.date;

            const row = document.createElement('div');
            row.className = 'row-item';
            row.style.animationDelay = `${i * 0.05}s`;
            row.innerHTML = `
                <div class="row-main">
                    <div class="row-name">${title}</div>
                    <div class="row-meta"><b>${location}</b>${dept ? ' · ' + dept : ''}${dateApp ? ' · ' + formatDate(dateApp) : ''}</div>
                </div>
                <span class="pill pill-live">Live</span>
            `;
            listEl.appendChild(row);
        });
        updateTimestamp();
    });

    // ── 2. REFERRALS ──────────────────────────────────────────
    const refQuery = query(collection(db, 'NGU Referral submissions'), orderBy('submittedAt', 'desc'));

    onSnapshot(refQuery, (snapshot) => {
        const refs = [];
        snapshot.forEach(doc => refs.push({ id: doc.id, ...doc.data() }));

        animateCount(document.getElementById('stat-referrals'), refs.length);
        document.getElementById('ref-count-badge').textContent = `${refs.length} total`;

        const listEl = document.getElementById('referrals-list');
        listEl.innerHTML = '';

        if (!refs.length) { listEl.innerHTML = '<div class="empty-msg">No referrals yet.</div>'; return; }

        refs.slice(0, 30).forEach((ref, i) => {
            const status    = ref.status || 'Pending';
            const pillClass = status === 'Accepted' ? 'pill-accepted' : status === 'Denied' ? 'pill-denied' : 'pill-pending';
            const row = document.createElement('div');
            row.className = 'row-item';
            row.style.animationDelay = `${i * 0.04}s`;
            row.innerHTML = `
                <div class="row-main">
                    <div class="row-name">${safe(ref.referralName, 'Unnamed')}</div>
                    <div class="row-meta">via <b>${safe(ref.referrerName)}</b> · ${safe(ref.role, 'No role')}${ref.referralPostcode ? ' · ' + ref.referralPostcode : ''}</div>
                </div>
                <span class="pill ${pillClass}">${status}</span>
            `;
            listEl.appendChild(row);
        });
        updateTimestamp();
    });

    // ── 3. INTERVIEWS cache ───────────────────────────────────
    const intQuery = query(collection(db, 'NGU Interview Times'));
    onSnapshot(intQuery, (snapshot) => {
        interviewsCache = [];
        snapshot.forEach(doc => interviewsCache.push({ id: doc.id, ...doc.data() }));
        // Trigger a re-render of applications if data is already loaded
        if (lastAppsSnapshot) renderApplications(lastAppsSnapshot);
    });

    // ── 4. APPLICATIONS ───────────────────────────────────────
    let lastAppsSnapshot = null;
    const appQuery = query(collection(db, 'NGUO New Applicants'), orderBy('submittedAt', 'desc'));

    onSnapshot(appQuery, (snapshot) => {
        lastAppsSnapshot = snapshot;
        renderApplications(snapshot);
    });

    function renderApplications(snapshot) {
        const all = [];
        snapshot.forEach(doc => all.push({ id: doc.id, ...doc.data() }));

        // Filter out junk phone numbers
        const clean = all.filter(a => !isJunk(a));

        // Filter to active only — exclude archived/DNP
        const active = clean.filter(a => {
            if (a.finalRecruitmentDecision === 'Approved') return false;
            if (a.finalRecruitmentDecision === 'Rejected') return false;
            if (a.interviewDecision === 'Interview Rejected') return false;
            // Do Not Proceed from interview rec
            const email = (a.personalDetails?.email || '').toLowerCase();
            const interview = interviewsCache.find(i => i.applicantEmail?.toLowerCase() === email);
            if (interview?.interviewCompleted && interview?.interviewData?.recommendation === 'Do Not Proceed') return false;
            return true;
        });

        // Count those needing a review action (0 or 1 review only)
        const needsReview = active.filter(a => (a.reviews || []).length < 2).length;

        animateCount(document.getElementById('stat-applications'), active.length);
        animateCount(document.getElementById('stat-needs-review'), needsReview);
        document.getElementById('app-count-badge').textContent = `${active.length} active`;

        const listEl = document.getElementById('applications-list');
        listEl.innerHTML = '';

        if (!active.length) {
            listEl.innerHTML = '<div class="empty-msg">No active applications in pipeline.</div>';
            updateTimestamp();
            return;
        }

        // Sort: stage-decision first, then stage-reviewing, then stage-namecheck, then interview, then new
        const stageOrder = { 'stage-decision': 0, 'stage-reviewing': 1, 'stage-namecheck': 2, 'stage-interview': 3, 'stage-new': 4 };
        active.sort((a, b) => {
            const sa = resolveStage(a, interviewsCache).cssClass;
            const sb = resolveStage(b, interviewsCache).cssClass;
            return (stageOrder[sa] ?? 5) - (stageOrder[sb] ?? 5);
        });

        active.forEach((a, i) => {
            const stage = resolveStage(a, interviewsCache);
            const wt    = waitTime(a.submittedAt);
            const postcode = a.personalDetails?.postcode || '';

            const row = document.createElement('div');
            row.className = 'app-row';
            row.style.animationDelay = `${i * 0.025}s`;
            row.innerHTML = `
                <div class="app-row-info">
                    <div class="app-row-name">${safe(a.fullName, 'Unnamed Applicant')}</div>
                    <div class="app-row-meta"><b>${safe(a.position, 'No role')}</b>${postcode ? ' · ' + postcode : ''} · ${formatDate(a.submittedAt)}</div>
                </div>
                <span class="stage-badge ${stage.cssClass}"><span class="dot"></span>${stage.label}</span>
                <span class="wait-chip ${wt.urgent ? 'urgent' : ''}">${wt.label}</span>
            `;
            listEl.appendChild(row);
        });

        updateTimestamp();
    }
</script>

</body>
</html>
